// RECLAMAÇÕES (COMPLAINTS)
// ══════════════════════════════════════════════════════════════

const COMPLAINT_TYPES = [
  { v: 'delayed_delivery', l: 'Atraso na entrega' },
  { v: 'poor_service', l: 'Atendimento insatisfatório' },
  { v: 'product_quality', l: 'Qualidade do produto' },
  { v: 'wrong_spec', l: 'Especificação incorreta' },
  { v: 'billing_error', l: 'Erro de cobrança' },
  { v: 'missing_support', l: 'Suporte técnico ausente' },
  { v: 'broken_promise', l: 'Promessa não cumprida' },
  { v: 'communication_failure', l: 'Falha de comunicação' },
  { v: 'product_not_as_expected', l: 'Produto diferente do esperado' },
  { v: 'installation_problem', l: 'Problema na instalação' },
  { v: 'commercial_complaint', l: 'Reclamação comercial geral' },
  { v: 'other', l: 'Outro' },
];
const AREAS = [
  { v: 'support', l: 'Suporte Técnico' }, { v: 'operations', l: 'Operações/CD' },
  { v: 'sales', l: 'Comercial' }, { v: 'purchasing', l: 'Compras' },
  { v: 'warehouse', l: 'CD/Estoque' }, { v: 'fiscal', l: 'Fiscal' },
  { v: 'rma', l: 'RMA' }, { v: 'financial', l: 'Financeiro' },
  { v: 'cso', l: 'CSO' }, { v: 'admin', l: 'Admin' }, { v: 'board', l: 'Board' },
];
const COMPLAINT_STAGE = { open: 'Ouvida', in_progress: 'Tratada', awaiting_client: 'Aguard. cliente', resolved: 'Resolvida', closed: 'Sanada', cancelled: 'Cancelada' };
const COMPLAINT_FLOW = { open: ['in_progress'], in_progress: ['awaiting_client', 'resolved'], awaiting_client: ['in_progress', 'resolved'], resolved: ['closed'], closed: [], cancelled: [] };

function ComplaintsView({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/complaints${filter ? `?status=${filter}` : ''}`); setItems(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div>
        <div className="header-title">⚠️ Reclamações</div>
        <div className="header-sub">{items.length} reclamações {filter ? `(${COMPLAINT_STAGE[filter]})` : 'no total'}</div>
      </div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Nova Reclamação</button>
    </div>

    <div className="tabbar">
      {['', 'open', 'in_progress', 'awaiting_client', 'resolved', 'closed'].map(s => (
        <div key={s} className={`tabbar-item ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{s ? COMPLAINT_STAGE[s] : 'Todas'}</div>
      ))}
    </div>

    <div className="table-container">
      <table className="table">
        <thead><tr><th>#</th><th>Cliente</th><th>Tipo</th><th>Severidade</th><th>Estágio</th><th>Área Resp.</th><th>Risco (R$)</th><th>Ações</th></tr></thead>
        <tbody>
          {loading ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px' }}><span className="spinner" /></td></tr> :
            !items.length ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px', color: 'var(--muted)' }}>Nenhuma reclamação encontrada.</td></tr> :
            items.map(c => (
              <tr key={c.id}>
                <td style={{ fontFamily: 'monospace', fontWeight: 600 }}>#{c.id}</td>
                <td>{c.client_name}</td>
                <td>{COMPLAINT_TYPES.find(t => t.v === c.type_key)?.l || c.type_key}</td>
                <td><Pill tone={c.severity}>{c.severity}</Pill></td>
                <td><Pill>{COMPLAINT_STAGE[c.status] || c.status}</Pill></td>
                <td>{c.responsible_area}</td>
                <td>{c.loss_risk > 0 ? formatMoney(c.loss_risk) : '—'}</td>
                <td><button className="btn btn-sm btn-outline" onClick={() => setSelected(c)}>Ver</button></td>
              </tr>
            ))}
        </tbody>
      </table>
    </div>

    {openCreate && <CreateComplaintModal onClose={() => setOpenCreate(false)} onCreated={() => { load(); setOpenCreate(false); toast?.('Reclamação registrada.'); }} toast={toast} />}
    {selected && <ComplaintDetailModal id={selected.id} onClose={() => setSelected(null)} onChanged={load} toast={toast} />}
  </div>;
}

function CreateComplaintModal({ onClose, onCreated, toast }) {
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({
    client_id: '', business_unit_id: 'led', type_key: 'other', severity: 'medium',
    channel: 'whatsapp', reason: '', client_feeling: 'neutral', procedence: 'under_analysis',
    causing_area: '', responsible_area: 'cso', responsible_user_id: '', loss_risk: '', commercial_impact: ''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { const u = await api('/users/lookup'); setUsers(u || []); } catch(e) {}
  })(); }, []);

  const submit = async (e) => {
    e.preventDefault();
    if (!f.client_id || !f.reason.trim()) { toast?.('Cliente e motivo são obrigatórios.', 'error'); return; }
    setBusy(true);
    try {
      await api('/complaints', 'POST', {
        ...f, client_id: parseInt(f.client_id),
        causing_area: f.causing_area || null,
        responsible_user_id: f.responsible_user_id ? parseInt(f.responsible_user_id) : null,
        loss_risk: f.loss_risk ? parseFloat(f.loss_risk) : 0,
      });
      onCreated();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">⚠️ Nova Reclamação</div><div className="modal-sub">Registro inicial — etapa "ouvida"</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit}>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Cliente *</label>
              <select className="form-input" value={f.client_id} onChange={e => set('client_id', e.target.value)}>
                <option value="">Selecione...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Unidade de Negócio</label>
              <select className="form-input" value={f.business_unit_id} onChange={e => set('business_unit_id', e.target.value)}>
                <option value="led">LED</option><option value="ooh">OOH/DOOH</option><option value="rm">Retail Media</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Tipo de Reclamação *</label>
              <select className="form-input" value={f.type_key} onChange={e => set('type_key', e.target.value)}>
                {COMPLAINT_TYPES.map(t => <option key={t.v} value={t.v}>{t.l}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Severidade *</label>
              <select className="form-input" value={f.severity} onChange={e => set('severity', e.target.value)}>
                <option value="critical">🔴 Crítica</option><option value="high">🟠 Alta</option>
                <option value="medium">🟡 Média</option><option value="low">🟢 Baixa</option>
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Relato do Cliente *</label>
            <textarea className="form-input" value={f.reason} onChange={e => set('reason', e.target.value)} placeholder="O que o cliente relatou, exatamente como reportado..." />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Sentimento do Cliente</label>
              <select className="form-input" value={f.client_feeling} onChange={e => set('client_feeling', e.target.value)}>
                <option value="very_upset">Muito insatisfeito</option><option value="upset">Insatisfeito</option>
                <option value="neutral">Neutro</option><option value="satisfied">Satisfeito</option><option value="very_satisfied">Muito satisfeito</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Canal</label>
              <select className="form-input" value={f.channel} onChange={e => set('channel', e.target.value)}>
                <option value="whatsapp">WhatsApp</option><option value="email">E-mail</option><option value="phone">Telefone</option>
                <option value="sales">Comercial</option><option value="portal">Portal</option><option value="in_person">Presencial</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Área Causadora (se já souber)</label>
              <select className="form-input" value={f.causing_area} onChange={e => set('causing_area', e.target.value)}>
                <option value="">Ainda não identificada</option>
                {AREAS.map(a => <option key={a.v} value={a.v}>{a.l}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Área Responsável pela Tratativa *</label>
              <select className="form-input" value={f.responsible_area} onChange={e => set('responsible_area', e.target.value)}>
                {AREAS.map(a => <option key={a.v} value={a.v}>{a.l}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Responsável (pessoa)</label>
              <select className="form-input" value={f.responsible_user_id} onChange={e => set('responsible_user_id', e.target.value)}>
                <option value="">Não atribuído</option>
                {users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Risco de Perda Comercial (R$)</label>
              <input className="form-input" type="number" step="0.01" value={f.loss_risk} onChange={e => set('loss_risk', e.target.value)} placeholder="0.00" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Impacto Comercial</label>
            <textarea className="form-input" value={f.commercial_impact} onChange={e => set('commercial_impact', e.target.value)} placeholder="Risco de churn, redução de carteira, impacto em renovação..." />
          </div>
        </div>
        <div className="modal-footer">
          <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Registrar Reclamação</button>
        </div>
      </form>
    </div>
  </div>;
}

function ComplaintDetailModal({ id, onClose, onChanged, toast }) {
  const [c, setC] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [edit, setEdit] = useState({ causing_area: '', recovery_action: '', resolution: '' });

  const load = async () => {
    try { const data = await api(`/complaints/${id}`); setC(data); setEdit({ causing_area: data.causing_area || '', recovery_action: data.recovery_action || '', resolution: data.resolution || '' }); }
    catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);

  const saveIdentification = async () => {
    setBusy(true);
    try {
      await api(`/complaints/${id}`, 'PATCH', { causing_area: edit.causing_area || null, recovery_action: edit.recovery_action, resolution: edit.resolution });
      toast?.('Tratativa atualizada.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const changeStatus = async (status) => {
    setBusy(true);
    try {
      await api(`/complaints/${id}/status`, 'PATCH', { status });
      toast?.(`Status alterado para ${COMPLAINT_STAGE[status]}.`); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/complaints/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!c) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const nextStages = COMPLAINT_FLOW[c.status] || [];

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '720px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">Reclamação #{c.id} — {c.client_name}</div>
          <div className="modal-sub"><Pill tone={c.severity}>{c.severity}</Pill> &nbsp; <Pill>{COMPLAINT_STAGE[c.status]}</Pill></div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <p style={{ fontSize: '13px', color: 'var(--mid)', lineHeight: 1.6, whiteSpace: 'pre-wrap', background: 'var(--bg)', padding: '12px', borderRadius: '8px' }}>{c.reason}</p>

        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', margin: '14px 0' }}>
          {nextStages.map(s => <button key={s} className="btn btn-sm btn-purple" disabled={busy} onClick={() => changeStatus(s)}>→ {COMPLAINT_STAGE[s]}</button>)}
          {c.status !== 'cancelled' && c.status !== 'closed' && <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => changeStatus('cancelled')}>Cancelar reclamação</button>}
        </div>

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Identificação & Recuperação</div>
          <div className="form-row" style={{ marginBottom: '12px' }}>
            <div><label className="form-label">Área Causadora</label>
              <select className="form-input" value={edit.causing_area} onChange={e => setEdit(p => ({ ...p, causing_area: e.target.value }))}>
                <option value="">Não identificada</option>{AREAS.map(a => <option key={a.v} value={a.v}>{a.l}</option>)}
              </select>
            </div>
            <div><label className="form-label">Risco de Perda</label><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '8px' }}>{c.loss_risk > 0 ? formatMoney(c.loss_risk) : '—'}</p></div>
          </div>
          <div className="form-group"><label className="form-label">Ação de Recuperação</label>
            <textarea className="form-input" value={edit.recovery_action} onChange={e => setEdit(p => ({ ...p, recovery_action: e.target.value }))} placeholder="O que está sendo feito para reverter a insatisfação?" /></div>
          <div className="form-group"><label className="form-label">Resolução (necessária antes de marcar como resolvida)</label>
            <textarea className="form-input" value={edit.resolution} onChange={e => setEdit(p => ({ ...p, resolution: e.target.value }))} placeholder="Como foi resolvido?" /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveIdentification}>Salvar tratativa</button>
        </div>

        <div className="form-group">
          <label className="form-label">Adicionar nota interna</label>
          <div style={{ display: 'flex', gap: '8px' }}>
            <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota visível apenas internamente..." />
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
          </div>
        </div>

        <div style={{ marginTop: '16px' }}>
          <span className="form-label">Histórico</span>
          <Timeline items={c.history} />
        </div>
      </div>
    </div>
  </div>;
}

// ══════════════════════════════════════════════════════════════
// DEVOLUÇÕES (RETURNS)
// ══════════════════════════════════════════════════════════════

const RETURN_FLOW_ORDER = ['return_requested','under_review','awaiting_approval','approved','awaiting_customer_shipment','in_transit','received','under_inspection','awaiting_fiscal','awaiting_credit','refund_or_credit_issued','closed'];
const RETURN_LABEL = {
  return_requested: 'Solicitada', under_review: 'Em análise', awaiting_approval: 'Aguard. aprovação',
  approved: 'Aprovada', awaiting_customer_shipment: 'Aguard. envio cliente', in_transit: 'Em trânsito',
  received: 'Recebida', under_inspection: 'Em inspeção', awaiting_fiscal: 'Aguard. fiscal',
  awaiting_credit: 'Aguard. crédito', refund_or_credit_issued: 'Crédito/reembolso emitido',
  closed: 'Encerrada', rejected: 'Rejeitada',
};
const RETURN_DECISIONS = [
  { v: 'credit', l: 'Crédito' }, { v: 'swap', l: 'Troca' }, { v: 'replacement', l: 'Reposição' },
  { v: 'refund', l: 'Reembolso' }, { v: 'discount', l: 'Desconto' },
];

function ReturnsView({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/returns${filter ? `?status=${filter}` : ''}`); setItems(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">📦 Devoluções</div><div className="header-sub">{items.length} devoluções listadas</div></div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Nova Devolução</button>
    </div>

    <div className="tabbar" style={{ flexWrap: 'wrap' }}>
      <div className={`tabbar-item ${filter === '' ? 'active' : ''}`} onClick={() => setFilter('')}>Todas</div>
      {RETURN_FLOW_ORDER.map(s => <div key={s} className={`tabbar-item ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{RETURN_LABEL[s]}</div>)}
      <div className={`tabbar-item ${filter === 'rejected' ? 'active' : ''}`} onClick={() => setFilter('rejected')}>Rejeitadas</div>
    </div>

    <div className="table-container">
      <table className="table">
        <thead><tr><th>#</th><th>Cliente</th><th>Motivo</th><th>Qtd</th><th>Status</th><th>Custo Total Gerado</th><th>Ações</th></tr></thead>
        <tbody>
          {loading ? <tr><td colSpan="7" style={{ textAlign: 'center', padding: '20px' }}><span className="spinner" /></td></tr> :
            !items.length ? <tr><td colSpan="7" style={{ textAlign: 'center', padding: '20px', color: 'var(--muted)' }}>Nenhuma devolução encontrada.</td></tr> :
            items.map(r => (
              <tr key={r.id}>
                <td style={{ fontFamily: 'monospace', fontWeight: 600 }}>#{r.id}</td>
                <td>{r.client_name}</td>
                <td style={{ maxWidth: '220px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.reason}</td>
                <td>{r.quantity}</td>
                <td><Pill>{RETURN_LABEL[r.status] || r.status}</Pill></td>
                <td>{r.total_cost_generated > 0 ? <span style={{ color: 'var(--red)', fontWeight: 600 }}>{formatMoney(r.total_cost_generated)}</span> : '—'}</td>
                <td><button className="btn btn-sm btn-outline" onClick={() => setSelected(r)}>Ver</button></td>
              </tr>
            ))}
        </tbody>
      </table>
    </div>

    {openCreate && <CreateReturnModal onClose={() => setOpenCreate(false)} onCreated={() => { load(); setOpenCreate(false); toast?.('Devolução registrada.'); }} toast={toast} />}
    {selected && <ReturnDetailModal id={selected.id} onClose={() => setSelected(null)} onChanged={load} toast={toast} />}
  </div>;
}

function CreateReturnModal({ onClose, onCreated, toast }) {
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({
    client_id: '', business_unit_id: 'led', reason: '', quantity: 1, product_name: '',
    unit_value: '', order_number: '', nf_number: '', nf_value: '', nf_attached: false,
    ticket_id: '', responsible_user_id: ''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { const u = await api('/users/lookup'); setUsers(u || []); } catch(e) {}
  })(); }, []);

  const submit = async (e) => {
    e.preventDefault();
    if (!f.client_id || !f.reason.trim()) { toast?.('Cliente e motivo são obrigatórios.', 'error'); return; }
    setBusy(true);
    try {
      await api('/returns', 'POST', {
        ...f, client_id: parseInt(f.client_id), quantity: parseInt(f.quantity) || 1,
        unit_value: f.unit_value ? parseFloat(f.unit_value) : null,
        nf_value: f.nf_value ? parseFloat(f.nf_value) : null,
        ticket_id: f.ticket_id || null,
        responsible_user_id: f.responsible_user_id ? parseInt(f.responsible_user_id) : null,
      });
      onCreated();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">📦 Nova Devolução</div><div className="modal-sub">Solicitação de devolução de produto</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit}>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Cliente *</label>
              <select className="form-input" value={f.client_id} onChange={e => set('client_id', e.target.value)}>
                <option value="">Selecione...</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select></div>
            <div className="form-group"><label className="form-label">Unidade de Negócio</label>
              <select className="form-input" value={f.business_unit_id} onChange={e => set('business_unit_id', e.target.value)}>
                <option value="led">LED</option><option value="ooh">OOH/DOOH</option><option value="rm">Retail Media</option>
              </select></div>
          </div>
          <div className="form-group"><label className="form-label">Motivo da Devolução *</label>
            <textarea className="form-input" value={f.reason} onChange={e => set('reason', e.target.value)} placeholder="Por que o cliente está devolvendo o produto?" /></div>
          <div className="form-row-3">
            <div className="form-group"><label className="form-label">Produto</label><input className="form-input" value={f.product_name} onChange={e => set('product_name', e.target.value)} placeholder="Nome do produto" /></div>
            <div className="form-group"><label className="form-label">Quantidade *</label><input className="form-input" type="number" min="1" value={f.quantity} onChange={e => set('quantity', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Valor Unitário (R$)</label><input className="form-input" type="number" step="0.01" value={f.unit_value} onChange={e => set('unit_value', e.target.value)} placeholder="0.00" /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Nº Pedido</label><input className="form-input" value={f.order_number} onChange={e => set('order_number', e.target.value)} placeholder="PED-00000" /></div>
            <div className="form-group"><label className="form-label">Ticket Vinculado</label><input className="form-input" value={f.ticket_id} onChange={e => set('ticket_id', e.target.value)} placeholder="CSO-00000000-0000 (opcional)" /></div>
          </div>
          <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px' }}>
            <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Nota Fiscal</div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Nº NF</label><input className="form-input" value={f.nf_number} onChange={e => set('nf_number', e.target.value)} placeholder="NF-00000" /></div>
              <div className="form-group"><label className="form-label">Valor da NF (R$)</label><input className="form-input" type="number" step="0.01" value={f.nf_value} onChange={e => set('nf_value', e.target.value)} placeholder="0.00" /></div>
            </div>
            <label className="checkbox-item" style={{ width: 'fit-content' }}>
              <input type="checkbox" checked={f.nf_attached} onChange={e => set('nf_attached', e.target.checked)} id="nfatt" />
              <label htmlFor="nfatt" onClick={() => set('nf_attached', !f.nf_attached)} style={{ cursor: 'pointer' }}>{f.nf_attached ? '✓ NF anexada' : 'NF anexada?'}</label>
            </label>
          </div>
          <div className="form-group" style={{ marginTop: '12px' }}><label className="form-label">Responsável pela Tratativa</label>
            <select className="form-input" value={f.responsible_user_id} onChange={e => set('responsible_user_id', e.target.value)}>
              <option value="">Eu mesmo</option>{users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select></div>
        </div>
        <div className="modal-footer">
          <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Registrar Devolução</button>
        </div>
      </form>
    </div>
  </div>;
}

function ReturnDetailModal({ id, onClose, onChanged, toast }) {
  const [r, setR] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [tab, setTab] = useState('flow');
  const [cost, setCost] = useState({ root_cause: '', root_cause_notes: '', reduction_action: '', reduction_feasible: false, tax_cost: '', freight_cost: '', refaturamento_cost: '', difal_cost: '', cost_status: '', decision_notes: '' });
  const [decision, setDecision] = useState('');
  const [rejectReason, setRejectReason] = useState('');

  const load = async () => {
    try {
      const data = await api(`/returns/${id}`); setR(data);
      setCost({
        root_cause: data.root_cause || '', root_cause_notes: data.root_cause_notes || '',
        reduction_action: data.reduction_action || '', reduction_feasible: !!data.reduction_feasible,
        tax_cost: data.tax_cost ?? '', freight_cost: data.freight_cost ?? '',
        refaturamento_cost: data.refaturamento_cost ?? '', difal_cost: data.difal_cost ?? '',
        cost_status: data.cost_status || '', decision_notes: data.decision_notes || '',
      });
    } catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);

  const saveCost = async () => {
    setBusy(true);
    try {
      await api(`/returns/${id}`, 'PATCH', {
        ...cost,
        tax_cost: cost.tax_cost === '' ? null : parseFloat(cost.tax_cost),
        freight_cost: cost.freight_cost === '' ? null : parseFloat(cost.freight_cost),
        refaturamento_cost: cost.refaturamento_cost === '' ? null : parseFloat(cost.refaturamento_cost),
        difal_cost: cost.difal_cost === '' ? null : parseFloat(cost.difal_cost),
      });
      toast?.('Análise de custo salva.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const advance = async () => {
    const idx = RETURN_FLOW_ORDER.indexOf(r.status);
    const next = RETURN_FLOW_ORDER[idx + 1];
    if (!next) return;
    if (next === 'approved' && !decision) { toast?.('Selecione a decisão (crédito/troca/etc.) antes de aprovar.', 'error'); return; }
    setBusy(true);
    try {
      await api(`/returns/${id}/status`, 'PATCH', { status: next, decision: decision || undefined });
      toast?.(`Status: ${RETURN_LABEL[next]}.`); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const reject = async () => {
    if (!rejectReason.trim()) { toast?.('Informe o motivo da rejeição.', 'error'); return; }
    setBusy(true);
    try { await api(`/returns/${id}/status`, 'PATCH', { status: 'rejected', reject_reason: rejectReason }); toast?.('Devolução rejeitada.'); load(); onChanged?.(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/returns/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!r) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const nextLabel = RETURN_FLOW_ORDER[RETURN_FLOW_ORDER.indexOf(r.status) + 1];
  const totalCost = (parseFloat(r.tax_cost)||0) + (parseFloat(r.freight_cost)||0) + (parseFloat(r.refaturamento_cost)||0) + (parseFloat(r.difal_cost)||0) + (parseFloat(r.warehouse_overhead_cost)||0);

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '760px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">Devolução #{r.id} — {r.client_name}</div><div className="modal-sub"><Pill>{RETURN_LABEL[r.status] || r.status}</Pill></div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <div className="tabbar">
          <div className={`tabbar-item ${tab === 'flow' ? 'active' : ''}`} onClick={() => setTab('flow')}>Fluxo de Status</div>
          <div className={`tabbar-item ${tab === 'cost' ? 'active' : ''}`} onClick={() => setTab('cost')}>Análise de Custo</div>
          <div className={`tabbar-item ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>Histórico</div>
        </div>

        {tab === 'flow' && <>
          <p style={{ fontSize: '13px', color: 'var(--mid)', background: 'var(--bg)', padding: '12px', borderRadius: '8px', marginBottom: '12px' }}>{r.reason}</p>
          <div className="grid-2" style={{ marginBottom: '14px' }}>
            <div><span className="form-label">Produto</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.product_name_snap || '—'} (qtd {r.quantity})</p></div>
            <div><span className="form-label">NF</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.nf_number || '—'} {r.nf_attached ? '✓ anexada' : '⚠ não anexada'}</p></div>
          </div>
          {r.status !== 'closed' && r.status !== 'rejected' && <>
            {nextLabel === 'approved' && (
              <div className="form-group">
                <label className="form-label">Decisão (obrigatória para aprovar)</label>
                <select className="form-input" value={decision} onChange={e => setDecision(e.target.value)}>
                  <option value="">Selecione...</option>{RETURN_DECISIONS.map(d => <option key={d.v} value={d.v}>{d.l}</option>)}
                </select>
              </div>
            )}
            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', margin: '10px 0' }}>
              {nextLabel && <button className="btn btn-sm btn-purple" disabled={busy} onClick={advance}>→ {RETURN_LABEL[nextLabel]}</button>}
            </div>
            <div style={{ borderTop: '1px solid var(--line)', paddingTop: '12px', marginTop: '8px' }}>
              <label className="form-label">Rejeitar devolução</label>
              <div style={{ display: 'flex', gap: '8px' }}>
                <input className="form-input" value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="Motivo da rejeição..." />
                <button className="btn btn-sm btn-outline" disabled={busy} onClick={reject}>Rejeitar</button>
              </div>
            </div>
          </>}
          {r.decision && <p style={{ marginTop: '12px', fontSize: '12px', color: 'var(--mid)' }}>Decisão registrada: <strong>{RETURN_DECISIONS.find(d=>d.v===r.decision)?.l || r.decision}</strong></p>}
          {r.reject_reason && <p style={{ marginTop: '8px', fontSize: '12px', color: 'var(--red)' }}>Motivo da rejeição: {r.reject_reason}</p>}
        </>}

        {tab === 'cost' && <div className="cost-box">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Imposto (R$)</label><input className="form-input" type="number" step="0.01" value={cost.tax_cost} onChange={e => setCost(p=>({...p,tax_cost:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">Frete (R$)</label><input className="form-input" type="number" step="0.01" value={cost.freight_cost} onChange={e => setCost(p=>({...p,freight_cost:e.target.value}))} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Refaturamento (R$)</label><input className="form-input" type="number" step="0.01" value={cost.refaturamento_cost} onChange={e => setCost(p=>({...p,refaturamento_cost:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">DIFAL (R$)</label><input className="form-input" type="number" step="0.01" value={cost.difal_cost} onChange={e => setCost(p=>({...p,difal_cost:e.target.value}))} /></div>
          </div>
          <div className="cost-row"><span>Overhead de galpão (1,5% — calculado automaticamente)</span><span>{formatMoney(r.warehouse_overhead_cost || 0)}</span></div>
          <div className="cost-row total"><span>Custo Total Gerado pela Devolução</span><span style={{ color: 'var(--red)' }}>{formatMoney(totalCost)}</span></div>

          <div className="form-row" style={{ marginTop: '12px' }}>
            <div className="form-group"><label className="form-label">Causa Raiz</label>
              <select className="form-input" value={cost.root_cause} onChange={e => setCost(p=>({...p,root_cause:e.target.value}))}>
                <option value="">Não identificada</option><option value="logistics">Logística</option><option value="commercial">Comercial</option>
                <option value="product">Produto</option><option value="client_error">Erro do cliente</option><option value="other">Outra</option>
              </select></div>
            <label className="checkbox-item" style={{ alignSelf: 'flex-end', marginBottom: '16px', width: 'fit-content' }}>
              <input type="checkbox" checked={cost.reduction_feasible} onChange={e=>setCost(p=>({...p,reduction_feasible:e.target.checked}))} id="redfeas" />
              <label htmlFor="redfeas" onClick={()=>setCost(p=>({...p,reduction_feasible:!p.reduction_feasible}))} style={{cursor:'pointer'}}>{cost.reduction_feasible?'✓ Redução viável':'Redução de custo viável?'}</label>
            </label>
          </div>
          <div className="form-group"><label className="form-label">Notas da Causa Raiz</label><textarea className="form-input" value={cost.root_cause_notes} onChange={e => setCost(p=>({...p,root_cause_notes:e.target.value}))} /></div>
          <div className="form-group"><label className="form-label">Ação para Redução de Custo</label><textarea className="form-input" value={cost.reduction_action} onChange={e => setCost(p=>({...p,reduction_action:e.target.value}))} /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveCost}>Salvar Análise de Custo</button>
        </div>}

        {tab === 'history' && <>
          <Timeline items={r.history} />
          <div className="form-group" style={{ marginTop: '14px' }}>
            <label className="form-label">Adicionar nota interna</label>
            <div style={{ display: 'flex', gap: '8px' }}>
              <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota interna..." />
              <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
            </div>
          </div>
        </>}
      </div>
    </div>
  </div>;
}

// RMA
// ══════════════════════════════════════════════════════════════

const RMA_FLOW_ORDER = ['requested','under_analysis','awaiting_shipment','in_transit','received','technical_analysis','awaiting_decision','approved','repair','replacement','closed'];
const RMA_LABEL = {
  requested: 'Solicitado', under_analysis: 'Em análise', awaiting_shipment: 'Aguard. envio',
  in_transit: 'Em trânsito', received: 'Recebido', technical_analysis: 'Análise técnica',
  awaiting_decision: 'Aguard. decisão', approved: 'Aprovado', repair: 'Reparo',
  replacement: 'Substituição', rejected: 'Rejeitado', closed: 'Encerrado',
};
const RMA_OUTCOMES = [
  { v: 'loss', l: 'Perda' }, { v: 'replacement', l: 'Troca' },
  { v: 'supplier_rebate', l: 'Rebate da Indústria' }, { v: 'customer_return', l: 'Devolução ao Cliente' },
];
function suggestRmaAction(r) {
  if (r.outcome_type) return null; // já decidido, não precisa sugerir
  if (r.status === 'rejected' || r.status === 'closed') return null;
  if ((r.recurrence_count || 0) >= 2) {
    return { icon: '🏭', text: `Reincidência ${r.recurrence_count}x neste produto — escalar para o fornecedor${r.supplier_name ? ' ('+r.supplier_name+')' : ''} e avaliar rebate, não só troca pontual.`, suggestedOutcome: 'supplier_rebate' };
  }
  if (r.warranty && r.supplier_name) {
    return { icon: '🛡️', text: `Produto em garantia com fornecedor identificado (${r.supplier_name}) — caminho natural é troca/reparo pelo fornecedor antes de gerar custo interno.`, suggestedOutcome: 'replacement' };
  }
  if (r.warranty && !r.supplier_name) {
    return { icon: '⚠️', text: 'Produto em garantia mas sem fornecedor identificado — preencha o fornecedor antes de decidir, senão a Nextra assume o custo sozinha.', suggestedOutcome: null };
  }
  if (!r.warranty) {
    return { icon: '🤝', text: 'Fora de garantia — avalie devolução ao cliente (se for engano comercial) ou perda controlada (se for desgaste/uso).', suggestedOutcome: 'customer_return' };
  }
  return null;
}

function RMAView({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/rma${filter ? `?status=${filter}` : ''}`); setItems(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);

  const recovered = items.filter(r => r.outcome_type === 'supplier_rebate' && r.rebate_status === 'applied')
    .reduce((s, r) => s + (parseFloat(r.rebate_value) || 0), 0);
  const recurrenceByGroup = {};
  items.forEach(r => {
    const key = r.product_code || r.product_name;
    if (!key) return;
    if (!recurrenceByGroup[key]) recurrenceByGroup[key] = { key, supplier: r.supplier_name || '—', count: 0 };
    recurrenceByGroup[key].count++;
  });
  const topRecurrence = Object.values(recurrenceByGroup).filter(g => g.count > 1).sort((a,b) => b.count - a.count).slice(0, 5);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">🔧 RMA</div><div className="header-sub">{items.length} RMAs listados</div></div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Novo RMA</button>
    </div>

    <div className="grid-2">
      <div className="metric-card">
        <div className="metric-label">💰 Receita Recuperada via Rebate</div>
        <div className="metric-value" style={{ color: 'var(--ok)' }}>{formatMoney(recovered)}</div>
        <div className="metric-sub">rebates aplicados pela indústria</div>
      </div>
      <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px' }}>
        <div style={{ fontSize: '12px', fontWeight: 700, color: 'var(--dark)', marginBottom: '8px' }}>⚠ Produtos com Mais Reincidência</div>
        {!topRecurrence.length ? <p style={{ fontSize: '12px', color: 'var(--muted)' }}>Sem reincidência detectada ainda.</p> :
          topRecurrence.map(g => <div key={g.key} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', padding: '4px 0' }}>
            <span>{g.key} <span style={{ color: 'var(--muted)' }}>· {g.supplier}</span></span>
            <span className="badge badge-recurrence">↻ {g.count}x</span>
          </div>)}
      </div>
    </div>

    <div className="tabbar" style={{ flexWrap: 'wrap' }}>
      <div className={`tabbar-item ${filter === '' ? 'active' : ''}`} onClick={() => setFilter('')}>Todos</div>
      {RMA_FLOW_ORDER.map(s => <div key={s} className={`tabbar-item ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{RMA_LABEL[s]}</div>)}
      <div className={`tabbar-item ${filter === 'rejected' ? 'active' : ''}`} onClick={() => setFilter('rejected')}>Rejeitados</div>
    </div>

    <div className="table-container">
      <table className="table">
        <thead><tr><th>#</th><th>Cliente</th><th>Produto</th><th>Fornecedor</th><th>Defeito</th><th>Status</th><th>Recorrência</th><th>Ações</th></tr></thead>
        <tbody>
          {loading ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px' }}><span className="spinner" /></td></tr> :
            !items.length ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px', color: 'var(--muted)' }}>Nenhum RMA encontrado.</td></tr> :
            items.map(r => (
              <tr key={r.id}>
                <td style={{ fontFamily: 'monospace', fontWeight: 600 }}>#{r.id}</td>
                <td>{r.client_name || '—'}</td>
                <td>{r.product_name}{r.product_code ? ` (${r.product_code})` : ''}</td>
                <td>{r.supplier_name || '—'}</td>
                <td style={{ maxWidth: '180px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.defect_description}</td>
                <td><Pill>{RMA_LABEL[r.status] || r.status}</Pill></td>
                <td>{r.is_recurrence ? <span className="badge badge-recurrence">↻ {r.recurrence_count}x</span> : '—'}</td>
                <td><button className="btn btn-sm btn-outline" onClick={() => setSelected(r)}>Ver</button></td>
              </tr>
            ))}
        </tbody>
      </table>
    </div>

    {openCreate && <CreateRMAModal onClose={() => setOpenCreate(false)} onCreated={(res) => { load(); setOpenCreate(false); toast?.(res?.is_recurrence ? `RMA registrado — ⚠ ${res.recurrence_count}ª recorrência deste produto.` : 'RMA registrado.'); }} toast={toast} />}
    {selected && <RMADetailModal id={selected.id} onClose={() => setSelected(null)} onChanged={load} toast={toast} />}
  </div>;
}

function CreateRMAModal({ onClose, onCreated, toast }) {
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [newSupplierName, setNewSupplierName] = useState('');
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({
    client_id: '', business_unit_id: 'led', ticket_id: '', product_name: '', product_code: '',
    serial_number: '', defect_description: '', warranty: false, unit_cost: '', supplier_id: '', responsible_user_id: ''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const loadSuppliers = async () => { try { const { data } = await api('/suppliers'); setSuppliers(data || []); } catch(e) {} };
  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { const u = await api('/users/lookup'); setUsers(u || []); } catch(e) {}
    loadSuppliers();
  })(); }, []);

  const quickAddSupplier = async () => {
    if (!newSupplierName.trim()) return;
    try {
      const s = await api('/suppliers', 'POST', { name: newSupplierName.trim() });
      await loadSuppliers(); set('supplier_id', s.id); setNewSupplierName('');
      toast?.('Fornecedor cadastrado.');
    } catch(e) { toast?.(e.message, 'error'); }
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!f.product_name.trim() || !f.defect_description.trim()) { toast?.('Produto e descrição do defeito são obrigatórios.', 'error'); return; }
    setBusy(true);
    try {
      const res = await api('/rma', 'POST', {
        ...f, client_id: f.client_id ? parseInt(f.client_id) : null,
        ticket_id: f.ticket_id || null,
        unit_cost: f.unit_cost ? parseFloat(f.unit_cost) : null,
        supplier_id: f.supplier_id ? parseInt(f.supplier_id) : null,
        responsible_user_id: f.responsible_user_id ? parseInt(f.responsible_user_id) : null,
      });
      onCreated(res);
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">🔧 Novo RMA</div><div className="modal-sub">Registro de produto com defeito / autorização de retorno</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit}>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Cliente</label>
              <select className="form-input" value={f.client_id} onChange={e => set('client_id', e.target.value)}>
                <option value="">Não vinculado / interno</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select></div>
            <div className="form-group"><label className="form-label">Unidade de Negócio</label>
              <select className="form-input" value={f.business_unit_id} onChange={e => set('business_unit_id', e.target.value)}>
                <option value="led">LED</option><option value="ooh">OOH/DOOH</option><option value="rm">Retail Media</option>
              </select></div>
          </div>
          <div className="form-row-3">
            <div className="form-group"><label className="form-label">Produto *</label><input className="form-input" value={f.product_name} onChange={e => set('product_name', e.target.value)} placeholder="Nome / modelo" /></div>
            <div className="form-group"><label className="form-label">Código do Produto</label><input className="form-input" value={f.product_code} onChange={e => set('product_code', e.target.value)} placeholder="SKU" /></div>
            <div className="form-group"><label className="form-label">Nº de Série</label><input className="form-input" value={f.serial_number} onChange={e => set('serial_number', e.target.value)} placeholder="S/N" /></div>
          </div>
          <div className="form-group">
            <label className="form-label">Fornecedor do Produto</label>
            <div style={{ display: 'flex', gap: '8px' }}>
              <select className="form-input" value={f.supplier_id} onChange={e => set('supplier_id', e.target.value)}>
                <option value="">Não identificado</option>{suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: '8px', marginTop: '6px' }}>
              <input className="form-input" value={newSupplierName} onChange={e => setNewSupplierName(e.target.value)} placeholder="Fornecedor novo? Digite o nome e cadastre" />
              <button type="button" className="btn btn-sm btn-outline" onClick={quickAddSupplier}>+ Cadastrar</button>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Descrição do Defeito *</label>
            <textarea className="form-input" value={f.defect_description} onChange={e => set('defect_description', e.target.value)} placeholder="Descreva o defeito apresentado..." /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Ticket Vinculado</label><input className="form-input" value={f.ticket_id} onChange={e => set('ticket_id', e.target.value)} placeholder="CSO-00000000-0000 (opcional)" /></div>
            <div className="form-group"><label className="form-label">Custo Unitário (R$)</label><input className="form-input" type="number" step="0.01" value={f.unit_cost} onChange={e => set('unit_cost', e.target.value)} placeholder="0.00" /></div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <label className="checkbox-item" style={{ width: 'fit-content' }}>
              <input type="checkbox" checked={f.warranty} onChange={e => set('warranty', e.target.checked)} id="warr" />
              <label htmlFor="warr" onClick={() => set('warranty', !f.warranty)} style={{ cursor: 'pointer' }}>{f.warranty ? '✓ Dentro da garantia' : 'Dentro da garantia?'}</label>
            </label>
          </div>
          <div className="form-group" style={{ marginTop: '12px' }}><label className="form-label">Responsável pela Tratativa</label>
            <select className="form-input" value={f.responsible_user_id} onChange={e => set('responsible_user_id', e.target.value)}>
              <option value="">Eu mesmo</option>{users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select></div>
        </div>
        <div className="modal-footer">
          <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Registrar RMA</button>
        </div>
      </form>
    </div>
  </div>;
}

function RMADetailModal({ id, onClose, onChanged, toast }) {
  const [r, setR] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [decision, setDecision] = useState('');
  const [suppliers, setSuppliers] = useState([]);
  const [outcome, setOutcome] = useState({ outcome_type: '', technical_notes: '', decision_notes: '', rebate_applicable: false, rebate_value: '', rebate_status: '', supplier_id: '' });

  const load = async () => {
    try {
      const data = await api(`/rma/${id}`); setR(data);
      setOutcome({
        outcome_type: data.outcome_type || '', technical_notes: data.technical_notes || '',
        decision_notes: data.decision_notes || '', rebate_applicable: !!data.rebate_applicable,
        rebate_value: data.rebate_value ?? '', rebate_status: data.rebate_status || '',
        supplier_id: data.supplier_id || '',
      });
    } catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);
  useEffect(() => { (async () => { try { const { data } = await api('/suppliers'); setSuppliers(data || []); } catch(e) {} })(); }, []);

  const advance = async (status) => {
    setBusy(true);
    try { await api(`/rma/${id}/status`, 'PATCH', { status, decision: decision || undefined }); toast?.(`Status: ${RMA_LABEL[status]}.`); load(); onChanged?.(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const saveOutcome = async () => {
    setBusy(true);
    try {
      await api(`/rma/${id}`, 'PATCH', { ...outcome, supplier_id: outcome.supplier_id ? parseInt(outcome.supplier_id) : null, rebate_value: outcome.rebate_value === '' ? null : parseFloat(outcome.rebate_value) });
      toast?.('Desfecho registrado.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/rma/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!r) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const idx = RMA_FLOW_ORDER.indexOf(r.status);
  const nextStatus = idx >= 0 ? RMA_FLOW_ORDER[idx + 1] : null;

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '740px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">RMA #{r.id} — {r.product_name}</div>
          <div className="modal-sub"><Pill>{RMA_LABEL[r.status] || r.status}</Pill> {r.warranty && <span style={{ marginLeft: '8px' }}>🛡️ Em garantia</span>}</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <p style={{ fontSize: '13px', color: 'var(--mid)', background: 'var(--bg)', padding: '12px', borderRadius: '8px', marginBottom: '12px' }}>{r.defect_description}</p>

        <div className="grid-2" style={{ marginBottom: '14px' }}>
          <div><span className="form-label">Cliente</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.client_name || '—'}</p></div>
          <div><span className="form-label">Fornecedor</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.supplier_name || '— não identificado —'}</p></div>
        </div>
        <div className="grid-2" style={{ marginBottom: '14px' }}>
          <div><span className="form-label">Nº Série</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.serial_number || '—'}</p></div>
          <div><span className="form-label">Código do Produto</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.product_code || '—'}</p></div>
        </div>

        {(() => { const sug = suggestRmaAction(r); return sug ? (
          <div style={{ marginBottom: '14px', padding: '12px', background: 'var(--pbg)', borderRadius: '8px', borderLeft: '3px solid var(--p)' }}>
            <span className="form-label" style={{ color: 'var(--pd)' }}>{sug.icon} Próxima Ação Sugerida</span>
            <p style={{ fontSize: '12px', color: 'var(--dark)', marginTop: '4px', lineHeight: 1.5 }}>{sug.text}</p>
            {sug.suggestedOutcome && <button className="btn btn-sm btn-purple" style={{ marginTop: '8px' }} onClick={() => setOutcome(p => ({ ...p, outcome_type: sug.suggestedOutcome }))}>Aplicar desfecho sugerido</button>}
          </div>
        ) : null; })()}

        {r.related_recurrences && r.related_recurrences.length > 0 && (
          <div style={{ marginBottom: '14px', padding: '12px', background: 'rgba(220,38,38,.08)', borderRadius: '8px', borderLeft: '3px solid var(--red)' }}>
            <span className="form-label" style={{ color: 'var(--red)' }}>⚠ Recorrência — {r.related_recurrences.length} ocorrência(s) anterior(es) deste produto</span>
            <ul style={{ marginTop: '6px', paddingLeft: '18px', fontSize: '12px', color: 'var(--mid)' }}>
              {r.related_recurrences.slice(0,5).map(rec => <li key={rec.id}>RMA #{rec.id} — {RMA_LABEL[rec.status]||rec.status} — {formatDate(rec.created_at)}</li>)}
            </ul>
          </div>
        )}

        {r.status !== 'closed' && r.status !== 'rejected' && (
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '14px' }}>
            {nextStatus === 'approved' && (
              <select className="form-input" style={{ maxWidth: '220px' }} value={decision} onChange={e => setDecision(e.target.value)}>
                <option value="">Decisão (repair/replacement/credit/rejection)</option>
                <option value="repair">Reparo</option><option value="replacement">Substituição</option>
                <option value="credit">Crédito</option><option value="rejection">Rejeição</option>
              </select>
            )}
            {nextStatus && <button className="btn btn-sm btn-purple" disabled={busy} onClick={() => advance(nextStatus)}>→ {RMA_LABEL[nextStatus]}</button>}
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => advance('rejected')}>Rejeitar</button>
          </div>
        )}

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Desfecho (Outcome)</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Tipo de Desfecho</label>
              <select className="form-input" value={outcome.outcome_type} onChange={e => setOutcome(p => ({ ...p, outcome_type: e.target.value }))}>
                <option value="">Não definido</option>{RMA_OUTCOMES.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
              </select></div>
            <div className="form-group"><label className="form-label">Fornecedor responsável</label>
              <select className="form-input" value={outcome.supplier_id} onChange={e => setOutcome(p => ({ ...p, supplier_id: e.target.value }))}>
                <option value="">Não identificado</option>{suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select></div>
          </div>
          <div className="form-row">
            <label className="checkbox-item" style={{ alignSelf: 'flex-end', marginBottom: '16px', width: 'fit-content' }}>
              <input type="checkbox" checked={outcome.rebate_applicable} onChange={e => setOutcome(p => ({ ...p, rebate_applicable: e.target.checked }))} id="rebapp" />
              <label htmlFor="rebapp" onClick={() => setOutcome(p => ({ ...p, rebate_applicable: !p.rebate_applicable }))} style={{ cursor: 'pointer' }}>{outcome.rebate_applicable ? '✓ Rebate aplicável' : 'Rebate da indústria aplicável?'}</label>
            </label>
            {outcome.rebate_applicable && <div className="form-group"><label className="form-label">Valor do Rebate (R$)</label><input className="form-input" type="number" step="0.01" value={outcome.rebate_value} onChange={e => setOutcome(p => ({ ...p, rebate_value: e.target.value }))} /></div>}
          </div>
          {outcome.rebate_applicable && <div className="form-group"><label className="form-label">Status do Rebate</label>
            <select className="form-input" value={outcome.rebate_status} onChange={e => setOutcome(p => ({ ...p, rebate_status: e.target.value }))}>
              <option value="">—</option><option value="pending">Pendente</option><option value="requested">Solicitado</option>
              <option value="applied">Aplicado</option><option value="rejected">Rejeitado</option>
            </select></div>}
          <div className="form-group"><label className="form-label">Notas Técnicas</label><textarea className="form-input" value={outcome.technical_notes} onChange={e => setOutcome(p => ({ ...p, technical_notes: e.target.value }))} /></div>
          <div className="form-group"><label className="form-label">Notas da Decisão</label><textarea className="form-input" value={outcome.decision_notes} onChange={e => setOutcome(p => ({ ...p, decision_notes: e.target.value }))} /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveOutcome}>Salvar Desfecho</button>
        </div>

        <div className="form-group">
          <label className="form-label">Adicionar nota interna</label>
          <div style={{ display: 'flex', gap: '8px' }}>
            <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota interna..." />
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
          </div>
        </div>

        <div style={{ marginTop: '16px' }}><span className="form-label">Histórico</span><Timeline items={r.history} /></div>
      </div>
    </div>
  </div>;
}

function TowerSection({ title, icon, items, renderRow, emptyMsg }) {
  return <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px', marginBottom: '16px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px' }}>
      <span style={{ fontSize: '16px' }}>{icon}</span>
      <span style={{ fontSize: '13px', fontWeight: 700, color: 'var(--dark)' }}>{title}</span>
      <span className="badge badge-status">{items.length}</span>
    </div>
    {!items.length ? <p style={{ fontSize: '12px', color: 'var(--muted)' }}>{emptyMsg}</p> :
      <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>{items.map(renderRow)}</div>}
  </div>;
}
const towerRow = (children) => <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 10px', background: 'var(--bg)', borderRadius: '7px', fontSize: '12px' }}>{children}</div>;

function ControlTowerView({ toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    setLoading(true);
    try { setData(await api('/dashboard/control-tower')); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); const iv = setInterval(load, 60000); return () => clearInterval(iv); }, []);

  if (loading && !data) return <div style={{ textAlign: 'center', padding: '60px' }}><span className="spinner" /></div>;
  if (!data) return null;

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">🚨 Torre de Controle</div><div className="header-sub">O que precisa de ação agora — atualiza a cada 60s</div></div>
      <button className="btn btn-sm btn-outline" onClick={load}>↻ Atualizar</button>
    </div>

    <div className="grid-2" style={{ alignItems: 'start' }}>
      <div>
        <TowerSection title="Chamados Críticos Abertos" icon="🔴" items={data.critical_tickets} emptyMsg="Nenhum chamado crítico aberto."
          renderRow={t => towerRow(<><span><strong>{t.id}</strong> — {t.client_name}</span><span style={{color:'var(--red)'}}>{t.revenue_at_risk>0?formatMoney(t.revenue_at_risk):''}</span></>)} />
        <TowerSection title="SLA Vencido" icon="⏰" items={data.sla_overdue} emptyMsg="Nenhum SLA vencido."
          renderRow={t => towerRow(<><span><strong>{t.id}</strong> — {t.client_name}</span><Pill tone="critical">{t.status}</Pill></>)} />
        <TowerSection title="Chamados Sem Dono" icon="👤" items={data.no_owner_tickets} emptyMsg="Todos os chamados novos têm responsável."
          renderRow={t => towerRow(<><span><strong>{t.id}</strong> — {t.client_name}</span><span>{formatDate(t.created_at)}</span></>)} />
        <TowerSection title="Fila de Chancela" icon="✅" items={data.pending_approval} emptyMsg="Nenhuma chancela pendente."
          renderRow={t => towerRow(<><span><strong>{t.id}</strong> — {t.client_name}</span><Pill>pendente</Pill></>)} />
      </div>
      <div>
        <TowerSection title="Reclamações Críticas Abertas" icon="⚠️" items={data.critical_complaints} emptyMsg="Nenhuma reclamação crítica aberta."
          renderRow={c => towerRow(<><span>#{c.id} — {c.description?.slice(0,40)}...</span><span style={{color:'var(--red)'}}>{c.loss_risk>0?formatMoney(c.loss_risk):''}</span></>)} />
        <TowerSection title="Devoluções Travadas" icon="📦" items={data.blocked_returns} emptyMsg="Nenhuma devolução travada em aprovação/fiscal."
          renderRow={r => towerRow(<><span>#{r.id} — {r.reason?.slice(0,40)}...</span><Pill>{r.status}</Pill></>)} />
        <TowerSection title="RMA Parado" icon="🔧" items={data.stuck_rmas} emptyMsg="Nenhum RMA parado em decisão/recebimento."
          renderRow={r => towerRow(<><span>#{r.id} — {r.product_name}</span><Pill>{r.status}</Pill></>)} />
        <TowerSection title="Chamados Sem Atualização (48h+)" icon="🕑" items={data.no_update_tickets} emptyMsg="Tudo atualizado nas últimas 48h."
          renderRow={t => towerRow(<><span><strong>{t.id}</strong> — {t.client_name}</span><span style={{color:'var(--red)'}}>{t.hours_since_update}h parado</span></>)} />
      </div>
    </div>
  </div>;
}

const HEALTH_COLOR = { healthy: 'var(--ok)', attention: '#F59E0B', at_risk: 'var(--red)', critical: '#7F1D1D', recovered: 'var(--p)' };
const HEALTH_LABEL = { healthy: '🟢 Saudável', attention: '🟡 Atenção', at_risk: '🔴 Em Risco', critical: '⚫ Crítico', recovered: '💜 Recuperado' };

function ClientList360({ onSelect }) {

function Client360Detail({ clientId, onBack, toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('overview');
  const [timeline, setTimeline] = useState([]);

  const load = async () => {
    setLoading(true);
    try {
      const d = await api(`/clients/${clientId}/360`);
      setData(d);
      // Montar timeline unificada
      const events = [
        ...(d.tickets || []).map(t => ({ ...t, _type: 'ticket', _icon: '📋', _label: `Chamado ${t.id}`, _date: t.created_at })),
        ...(d.complaints || []).map(c => ({ ...c, _type: 'complaint', _icon: '⚠️', _label: `Reclamação #${c.id}`, _date: c.created_at })),
        ...(d.returns || []).map(r => ({ ...r, _type: 'return', _icon: '📦', _label: `Devolução #${r.id}`, _date: r.created_at })),
        ...(d.rmas || []).map(r => ({ ...r, _type: 'rma', _icon: '🔧', _label: `RMA #${r.id}`, _date: r.created_at })),
        ...(d.csat || []).map(c => ({ ...c, _type: 'csat', _icon: '⭐', _label: `CSAT ${c.score}/5`, _date: c.collection_date })),
        ...(d.nps || []).map(n => ({ ...n, _type: 'nps', _icon: '📊', _label: `NPS ${n.score} (${n.nps_type})`, _date: n.collection_date })),
      ].sort((a, b) => new Date(b._date) - new Date(a._date));
      setTimeline(events);
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [clientId]);

  if (loading) return <div style={{ textAlign: 'center', padding: '60px' }}><span className="spinner" /></div>;
  if (!data) return null;
  const { client: c, summary: s } = data;

  return <div className="section-grid">

        <div className="header-title">{c.name}</div>
        <div className="header-sub">{HEALTH_LABEL[c.health_status]} · Health Score: {c.health_score}</div>
      </div>
    </div>

    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
      {[['overview','Visão Geral'],['tickets','Chamados'],['complaints','Reclamações'],['returns','Devoluções'],['rmas','RMA'],['satisfaction','CSAT/NPS'],['recovery','Recuperação'],['timeline','Timeline']].map(([id,label]) => (
        <div key={id} className={`tabbar-item ${tab===id?'active':''}`} style={{ cursor:'pointer' }} onClick={() => setTab(id)}>{label}</div>
      ))}
    </div>

    {tab === 'overview' && <>
      <div className="grid-3">
        <div className="metric-card"><div className="metric-label">📋 Chamados abertos</div><div className="metric-value">{s.open_tickets}</div></div>
        <div className="metric-card"><div className="metric-label">⚠️ Reclamações abertas</div><div className="metric-value">{s.open_complaints}</div></div>
        <div className="metric-card"><div className="metric-label">💰 Receita em risco</div><div className="metric-value" style={{ fontSize: '18px', color: s.total_revenue_at_risk > 0 ? 'var(--red)' : 'inherit' }}>{formatMoney(s.total_revenue_at_risk)}</div></div>
        <div className="metric-card"><div className="metric-label">📦 Devoluções abertas</div><div className="metric-value">{s.open_returns}</div></div>
        <div className="metric-card"><div className="metric-label">🔧 RMAs abertos</div><div className="metric-value">{s.open_rmas}</div></div>
        <div className="metric-card"><div className="metric-label">💸 Custo de devoluções</div><div className="metric-value" style={{ fontSize: '16px', color: s.total_returns_cost > 0 ? 'var(--red)' : 'inherit' }}>{formatMoney(s.total_returns_cost)}</div></div>

      </div>
      {data.recovery_plans?.filter(r => ['open','in_progress'].includes(r.status)).length > 0 && (
        <div style={{ background: 'var(--pbg)', borderRadius: '12px', padding: '14px', borderLeft: '3px solid var(--p)' }}>
          <span className="form-label" style={{ color: 'var(--pd)' }}>🎯 Plano de Recuperação Ativo</span>

          ))}

      )}

    {tab === 'tickets' && <div className="table-container"><table className="table">
      <thead><tr><th>ID</th><th>Tipo</th><th>Criticidade</th><th>Status</th><th>Receita Risco</th><th>Data</th></tr></thead>
      <tbody>{!data.tickets?.length ? <tr><td colSpan="6" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Sem chamados.</td></tr> :
        data.tickets.map(t => <tr key={t.id}><td style={{fontFamily:'monospace',fontWeight:600}}>{t.id}</td><td>{t.occurrence_type}</td><td><span className={`badge badge-${t.criticality}`}>{t.criticality}</span></td><td><Pill>{TICKET_STATUS_LABEL[t.status]||t.status}</Pill></td><td>{t.revenue_at_risk>0?<span style={{color:'var(--red)',fontWeight:600}}>{formatMoney(t.revenue_at_risk)}</span>:'—'}</td><td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(t.created_at)}</td></tr>)}
      </tbody></table></div>}

    {tab === 'complaints' && <div className="table-container"><table className="table">
      <thead><tr><th>#</th><th>Tipo</th><th>Severidade</th><th>Status</th><th>Risco</th><th>Data</th></tr></thead>
      <tbody>{!data.complaints?.length ? <tr><td colSpan="6" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Sem reclamações.</td></tr> :
        data.complaints.map(c => <tr key={c.id}><td>#{c.id}</td><td>{c.type_key}</td><td><Pill tone={c.severity}>{c.severity}</Pill></td><td><Pill>{COMPLAINT_STAGE[c.status]||c.status}</Pill></td><td>{c.loss_risk>0?formatMoney(c.loss_risk):'—'}</td><td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(c.created_at)}</td></tr>)}
      </tbody></table></div>}

    {tab === 'returns' && <div className="table-container"><table className="table">
      <thead><tr><th>#</th><th>Motivo</th><th>Status</th><th>Custo</th><th>Data</th></tr></thead>
      <tbody>{!data.returns?.length ? <tr><td colSpan="5" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Sem devoluções.</td></tr> :
        data.returns.map(r => <tr key={r.id}><td>#{r.id}</td><td style={{maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.reason}</td><td><Pill>{RETURN_LABEL[r.status]||r.status}</Pill></td><td>{parseFloat(r.total_cost)>0?<span style={{color:'var(--red)',fontWeight:600}}>{formatMoney(r.total_cost)}</span>:'—'}</td><td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(r.created_at)}</td></tr>)}
      </tbody></table></div>}

    {tab === 'rmas' && <div className="table-container"><table className="table">
      <thead><tr><th>#</th><th>Produto</th><th>Status</th><th>Desfecho</th><th>Data</th></tr></thead>
      <tbody>{!data.rmas?.length ? <tr><td colSpan="5" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Sem RMAs.</td></tr> :
        data.rmas.map(r => <tr key={r.id}><td>#{r.id}</td><td>{r.product_name}</td><td><Pill>{RMA_LABEL[r.status]||r.status}</Pill></td><td>{r.outcome_type?RMA_OUTCOMES.find(o=>o.v===r.outcome_type)?.l||r.outcome_type:'—'}</td><td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(r.created_at)}</td></tr>)}

    {tab === 'satisfaction' && <div className="grid-2">
      <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px' }}>
        <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '10px' }}>⭐ CSAT</div>
        {!data.csat?.length ? <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem registros.</p> :
          data.csat.map((cs, i) => <div key={i} style={{ padding: '6px 0', borderBottom: '1px solid var(--line)', fontSize: '12px' }}>
            <span style={{ fontWeight: 700 }}>{'⭐'.repeat(cs.score)}</span> <span style={{ color: 'var(--muted)' }}>{cs.collection_date}</span>
            {cs.comment && <p style={{ color: 'var(--mid)', marginTop: '2px' }}>{cs.comment}</p>}
          </div>)}
      </div>
      <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px' }}>
        <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '10px' }}>📊 NPS</div>
        {!data.nps?.length ? <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem registros.</p> :
          data.nps.map((n, i) => <div key={i} style={{ padding: '6px 0', borderBottom: '1px solid var(--line)', fontSize: '12px' }}>

            {n.comment && <p style={{ color: 'var(--mid)', marginTop: '2px' }}>{n.comment}</p>}
          </div>)}
      </div>
    </div>}

    {tab === 'recovery' && <>
      {!data.recovery_plans?.length ? <p style={{fontSize:'12px',color:'var(--muted)',padding:'20px 0'}}>Nenhum plano de recuperação para este cliente.</p> :
        data.recovery_plans.map(p => <div key={p.id} style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px', marginBottom: '8px' }}>

            <div><div style={{ fontWeight: 700 }}>Plano #{p.id}</div><div style={{ fontSize: '12px', color: 'var(--muted)' }}>Health ao abrir: {p.health_score_at_open} → Target: {p.target_health_score}</div></div>

    {tab === 'timeline' && <div style={{ maxHeight: '600px', overflowY: 'auto' }}>
      <Timeline items={timeline.map(e => ({ id: e.id, action: `${e._icon} ${e._label}`, created_at: e._date, note: e.description || e.reason || e.defect_description || e.comment || '' }))} />
    </div>}
  </div>;
}
