function HealthScoreView({ toast }) {
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [factors, setFactors] = useState(null);
  const [hlog, setHlog] = useState([]);

  useEffect(() => { (async () => { try { const { data } = await api('/clients'); setClients(data || []); } catch(e) { toast?.(e.message, 'error'); } finally { setLoading(false); } })(); }, []);

  const openFactors = async (c) => {
    setSelected(c); setFactors(null); setHlog([]);
    try {
      const [f, h] = await Promise.all([api(`/clients/${c.id}/health-factors`), api(`/clients/${c.id}/health-log`)]);
      setFactors(f); setHlog(h || []);
    } catch(e) { toast?.(e.message, 'error'); }
  };

  const critical = clients.filter(c => ['critical','at_risk'].includes(c.health_status));
  const attention = clients.filter(c => c.health_status === 'attention');
  const healthy = clients.filter(c => ['healthy','recovered'].includes(c.health_status));

  const ScoreGauge = ({ score, status }) => {
    const c = HEALTH_COLOR[status] || 'var(--line)';
    const pct = Math.min(100, Math.max(0, score || 0));
    const angle = -135 + (pct / 100) * 270;
    return <div style={{ textAlign: 'center', padding: '8px' }}>
      <svg width="80" height="60" viewBox="0 0 80 60">
        <path d="M10,55 A35,35 0 0,1 70,55" fill="none" stroke="var(--line)" strokeWidth="8" strokeLinecap="round"/>
        <path d="M10,55 A35,35 0 0,1 70,55" fill="none" stroke={c} strokeWidth="8" strokeLinecap="round"
          strokeDasharray={`${(pct/100)*109.9} 109.9`}/>
        <text x="40" y="50" textAnchor="middle" fontSize="14" fontWeight="700" fill={c}>{score}</text>
      </svg>
    </div>;
  };

  return <div className="section-grid">
    <div><div className="header-title">❤️ Health Score</div><div className="header-sub">{critical.length} em risco/crítico · {attention.length} em atenção · {healthy.length} saudáveis</div></div>

    <div className="grid-3">
      <div className="metric-card" style={{ borderLeft: '4px solid var(--red)' }}><div className="metric-label">🔴 Em Risco / Críticos</div><div className="metric-value" style={{ color: 'var(--red)' }}>{critical.length}</div></div>
      <div className="metric-card" style={{ borderLeft: '4px solid #F59E0B' }}><div className="metric-label">🟡 Em Atenção</div><div className="metric-value" style={{ color: '#F59E0B' }}>{attention.length}</div></div>
      <div className="metric-card" style={{ borderLeft: '4px solid var(--ok)' }}><div className="metric-label">🟢 Saudáveis</div><div className="metric-value" style={{ color: 'var(--ok)' }}>{healthy.length}</div></div>
    </div>

    {loading ? <div style={{ textAlign: 'center', padding: '40px' }}><span className="spinner" /></div> :
    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
      {clients.map(c => (
        <div key={c.id} style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: '16px', cursor: 'pointer', borderLeft: `4px solid ${HEALTH_COLOR[c.health_status]||'var(--line)'}` }}
          onClick={() => openFactors(c)}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: '13px' }}>{c.name}</div>
            <div style={{ fontSize: '11px', color: 'var(--muted)' }}>{HEALTH_LABEL[c.health_status]} · {c.segment || '—'}</div>
          </div>
          <div style={{ display: 'flex', gap: '12px', fontSize: '12px', color: 'var(--mid)' }}>
            {c.open_tickets > 0 && <span>📋 {c.open_tickets}</span>}
            {c.revenue_at_risk > 0 && <span style={{ color: 'var(--red)' }}>💰 {formatMoney(c.revenue_at_risk)}</span>}
          </div>
          <div style={{ width: '48px', height: '48px', borderRadius: '50%', border: `3px solid ${HEALTH_COLOR[c.health_status]||'var(--line)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: '14px', color: HEALTH_COLOR[c.health_status] }}>{c.health_score ?? '—'}</div>
        </div>
      ))}
    </div>}

    {selected && <div className="modal" onClick={e => e.target === e.currentTarget && setSelected(null)}>
      <div className="modal-content" style={{ maxWidth: '560px' }}>
        <div className="modal-hdr">
          <div><div className="modal-title">❤️ {selected.name}</div><div className="modal-sub">{HEALTH_LABEL[selected.health_status]} · Score: {selected.health_score}</div></div>
          <button className="close-btn" onClick={() => setSelected(null)}>×</button>
        </div>
        <div className="modal-body">
          {!factors ? <div style={{ textAlign: 'center', padding: '30px' }}><span className="spinner" /></div> : <>
            <div style={{ fontWeight: 700, fontSize: '12px', color: 'var(--pd)', marginBottom: '10px', textTransform: 'uppercase' }}>Fatores de Penalidade</div>
            {!factors.factors?.length ? <p style={{ fontSize: '12px', color: 'var(--muted)' }}>Sem penalidades ativas — cliente saudável.</p> :
              factors.factors.map((f, i) => <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px', background: 'var(--bg)', borderRadius: '7px', marginBottom: '6px', fontSize: '12px' }}>
                <span>{f.icon} {f.label}</span><span style={{ fontWeight: 700, color: 'var(--red)' }}>−{f.penalty} pts</span>
              </div>)}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px', background: 'var(--pbg)', borderRadius: '7px', fontSize: '13px', fontWeight: 700 }}>
              <span>Score Final</span><span style={{ color: HEALTH_COLOR[factors.health_status] }}>{factors.health_score}/100</span>
            </div>
            {hlog?.length > 0 && <>
              <div style={{ fontWeight: 700, fontSize: '12px', color: 'var(--pd)', margin: '16px 0 8px', textTransform: 'uppercase' }}>Histórico de Variação</div>
              <Timeline items={hlog.map(h => ({ id: h.recorded_at, action: `${h.health_score} pts (${h.delta >= 0 ? '+' : ''}${h.delta})`, created_at: h.changed_at, note: h.reason }))} />
            </>}
          </>}
        </div>
      </div>
    </div>}
  </div>;
}

function CsatNpsView({ toast }) {
  const [csatData, setCsatData] = useState({ data: [], csat_avg: null });
  const [npsData, setNpsData] = useState({ data: [], nps_score: null, promoters: 0, detractors: 0, neutrals: 0 });
  const [clients, setClients] = useState([]);
  const [links, setLinks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('overview');
  const [openCreate, setOpenCreate] = useState(null); // 'csat' | 'nps' | 'link'
  const [f, setF] = useState({ client_id: '', score: '', comment: '', collection_date: new Date().toISOString().slice(0,10), survey_type: 'csat' });
  const [busy, setBusy] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [c, n, cl, lk] = await Promise.all([api('/csat'), api('/nps'), api('/clients'), api('/survey-links')]);
      setCsatData(c); setNpsData(n); setClients(cl.data || []); setLinks(lk.data || []);
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, []);

  const submit = async (e) => {
    e.preventDefault();
    if (!f.client_id) { toast?.('Selecione o cliente.', 'error'); return; }
    setBusy(true);
    try {
      if (openCreate === 'link') {
        const { survey_url } = await api('/survey-links', 'POST', { client_id: parseInt(f.client_id), survey_type: f.survey_type });
        toast?.(`Link gerado: ${survey_url}`);
        if (navigator.clipboard) await navigator.clipboard.writeText(survey_url);
        toast?.('Link copiado para a área de transferência!');
      } else {
        const endpoint = openCreate === 'csat' ? '/csat' : '/nps';
        await api(endpoint, 'POST', { client_id: parseInt(f.client_id), score: parseInt(f.score), comment: f.comment || null, collection_date: f.collection_date });
        toast?.(`${openCreate.toUpperCase()} registrado.`);
      }
      await load(); setOpenCreate(null); setF({ client_id: '', score: '', comment: '', collection_date: new Date().toISOString().slice(0,10), survey_type: 'csat' });
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const npsColor = (n) => n?.nps_score >= 50 ? 'var(--ok)' : n?.nps_score >= 0 ? '#F59E0B' : 'var(--red)';

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">⭐ CSAT / NPS</div><div className="header-sub">Satisfação e percepção do cliente</div></div>
      <div style={{ display: 'flex', gap: '8px' }}>
        <button className="btn btn-sm btn-outline" onClick={() => setOpenCreate('csat')}>+ CSAT</button>
        <button className="btn btn-sm btn-outline" onClick={() => setOpenCreate('nps')}>+ NPS</button>
        <button className="btn btn-purple btn-sm" onClick={() => setOpenCreate('link')}>📤 Disparar Pesquisa</button>
      </div>
    </div>

    <div className="grid-3">
      <div className="metric-card"><div className="metric-label">⭐ CSAT Médio</div><div className="metric-value">{csatData.csat_avg ? `${csatData.csat_avg}/5` : '—'}</div><div className="metric-sub">{csatData.data?.length || 0} respostas</div></div>
      <div className="metric-card"><div className="metric-label">📊 NPS Score</div><div className="metric-value" style={{ color: npsColor(npsData) }}>{npsData.nps_score ?? '—'}</div><div className="metric-sub">{npsData.promoters} promotores · {npsData.detractors} detratores</div></div>
      <div className="metric-card"><div className="metric-label">📤 Links Disparados</div><div className="metric-value">{links.length}</div><div className="metric-sub">{links.filter(l=>l.responded).length} respondidos</div></div>
    </div>

    <div className="tabbar">
      {[['overview','CSAT & NPS'],['links','Links Disparados']].map(([id,l]) => <div key={id} className={`tabbar-item ${tab===id?'active':''}`} onClick={() => setTab(id)}>{l}</div>)}
    </div>

    {tab === 'overview' && <div className="grid-2">
      <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px' }}>
        <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '10px' }}>⭐ Últimas Respostas CSAT</div>
        {loading ? <span className="spinner" /> : !csatData.data?.length ? <p style={{ fontSize: '12px', color: 'var(--muted)' }}>Sem respostas ainda.</p> :
          csatData.data.slice(0, 10).map((c, i) => <div key={i} style={{ padding: '8px 0', borderBottom: '1px solid var(--line)', fontSize: '12px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontWeight: 600 }}>{c.client_name}</span>
              <span style={{ fontWeight: 700, color: c.score >= 4 ? 'var(--ok)' : c.score >= 3 ? '#F59E0B' : 'var(--red)' }}>{'⭐'.repeat(c.score)}</span>
            </div>
            {c.comment && <p style={{ color: 'var(--mid)', marginTop: '2px', fontStyle: 'italic' }}>"{c.comment}"</p>}
            <span style={{ color: 'var(--muted)' }}>{c.collection_date}</span>
          </div>)}
      </div>
      <div style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px' }}>
        <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '10px' }}>📊 Últimas Respostas NPS</div>
        {loading ? <span className="spinner" /> : !npsData.data?.length ? <p style={{ fontSize: '12px', color: 'var(--muted)' }}>Sem respostas ainda.</p> :
          npsData.data.slice(0, 10).map((n, i) => <div key={i} style={{ padding: '8px 0', borderBottom: '1px solid var(--line)', fontSize: '12px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontWeight: 600 }}>{n.client_name}</span>
              <span style={{ fontWeight: 700, color: n.nps_type==='promoter'?'var(--ok)':n.nps_type==='detractor'?'var(--red)':'#F59E0B' }}>{n.score}/10 — {n.nps_type}</span>
            </div>
            {n.comment && <p style={{ color: 'var(--mid)', marginTop: '2px', fontStyle: 'italic' }}>"{n.comment}"</p>}
            <span style={{ color: 'var(--muted)' }}>{n.collection_date}</span>
          </div>)}
      </div>
    </div>}

    {tab === 'links' && <div className="table-container"><table className="table">
      <thead><tr><th>Cliente</th><th>Tipo</th><th>Criado em</th><th>Respondido?</th><th>Expira em</th></tr></thead>
      <tbody>{!links.length ? <tr><td colSpan="5" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Nenhum link disparado ainda.</td></tr> :
        links.map(l => <tr key={l.id}>
          <td>{l.client_name}</td><td><Pill>{l.survey_type.toUpperCase()}</Pill></td>
          <td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(l.created_at)}</td>
          <td>{l.responded ? <span style={{color:'var(--ok)',fontWeight:600}}>✓ Sim</span> : <span style={{color:'var(--muted)'}}>Aguardando</span>}</td>
          <td style={{fontSize:'11px',color:'var(--muted)'}}>{formatDate(l.expires_at)}</td>
        </tr>)}
      </tbody></table></div>}

    {openCreate && <div className="modal" onClick={e => e.target === e.currentTarget && setOpenCreate(null)}>
      <div className="modal-content" style={{ maxWidth: '480px' }}>
        <div className="modal-hdr">
          <div><div className="modal-title">{openCreate === 'link' ? '📤 Disparar Pesquisa' : openCreate === 'csat' ? '⭐ Registrar CSAT' : '📊 Registrar NPS'}</div></div>
          <button className="close-btn" onClick={() => setOpenCreate(null)}>×</button>
        </div>
        <form onSubmit={submit}>
          <div className="modal-body">
            <div className="form-group"><label className="form-label">Cliente *</label>
              <select className="form-input" value={f.client_id} onChange={e => setF(p => ({ ...p, client_id: e.target.value }))}>
                <option value="">Selecione...</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select></div>
            {openCreate === 'link' && <div className="form-group"><label className="form-label">Tipo de Pesquisa</label>
              <select className="form-input" value={f.survey_type} onChange={e => setF(p => ({ ...p, survey_type: e.target.value }))}>
                <option value="csat">CSAT (satisfação 1–5)</option><option value="nps">NPS (recomendação 0–10)</option>
              </select></div>}
            {openCreate !== 'link' && <>
              <div className="form-group"><label className="form-label">{openCreate === 'csat' ? 'Nota (1 a 5) *' : 'Nota (0 a 10) *'}</label>
                <input className="form-input" type="number" min={openCreate==='csat'?1:0} max={openCreate==='csat'?5:10} value={f.score} onChange={e => setF(p => ({ ...p, score: e.target.value }))} /></div>
              <div className="form-group"><label className="form-label">Comentário</label>
                <textarea className="form-input" value={f.comment} onChange={e => setF(p => ({ ...p, comment: e.target.value }))} /></div>
              <div className="form-group"><label className="form-label">Data de coleta</label>
                <input className="form-input" type="date" value={f.collection_date} onChange={e => setF(p => ({ ...p, collection_date: e.target.value }))} /></div>
            </>}
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-outline" onClick={() => setOpenCreate(null)}>Cancelar</button>
            <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}{openCreate === 'link' ? '📤 Gerar e copiar link' : '✓ Registrar'}</button>
          </div>
        </form>
      </div>
    </div>}
  </div>;
}

const RECOVERY_STATUS_LABEL = { open: 'Aberto', in_progress: 'Em andamento', awaiting_client: 'Aguard. cliente', completed: 'Concluído', cancelled: 'Cancelado' };
const ACTION_STATUS_LABEL = { pending: 'Pendente', in_progress: 'Em andamento', done: 'Concluído', cancelled: 'Cancelado' };

function RecoveryPlansView({ toast }) {
  const [plans, setPlans] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/recovery-plans${filter ? `?status=${filter}` : ''}`); setPlans(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);
  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { setUsers(await api('/users/lookup')); } catch(e) {}
  })(); }, []);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">🎯 Planos de Recuperação</div><div className="header-sub">{plans.length} planos listados</div></div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Novo Plano</button>
    </div>

    <div className="tabbar">
      <div className={`tabbar-item ${filter===''?'active':''}`} onClick={() => setFilter('')}>Todos</div>
      {Object.entries(RECOVERY_STATUS_LABEL).map(([k,l]) => <div key={k} className={`tabbar-item ${filter===k?'active':''}`} onClick={() => setFilter(k)}>{l}</div>)}
    </div>

    {loading ? <div style={{ textAlign: 'center', padding: '40px' }}><span className="spinner" /></div> :
    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
      {!plans.length ? <p style={{ textAlign: 'center', padding: '40px', color: 'var(--muted)' }}>Nenhum plano encontrado.</p> :
        plans.map(p => (
          <div key={p.id} style={{ background: '#fff', borderRadius: '12px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', padding: '16px', cursor: 'pointer', borderLeft: `4px solid ${HEALTH_COLOR[p.health_status]||'var(--line)'}` }}
            onClick={() => setSelected(p)}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: '14px' }}>{p.client_name}</div>
                <div style={{ fontSize: '12px', color: 'var(--muted)', margin: '2px 0 6px' }}>Health ao abrir: {p.health_score_at_open || '—'} → Target: {p.target_health_score || '—'} · {p.responsible_name || 'sem responsável'}</div>
                <p style={{ fontSize: '12px', color: 'var(--mid)', lineHeight: 1.5 }}>{p.reason}</p>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '6px' }}>
                <Pill>{RECOVERY_STATUS_LABEL[p.status] || p.status}</Pill>
                {p.next_review_date && <span style={{ fontSize: '11px', color: 'var(--muted)' }}>Revisão: {p.next_review_date}</span>}
              </div>
            </div>
            {p.actions?.length > 0 && (
              <div style={{ marginTop: '10px', display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                {p.actions.map(a => <span key={a.id} style={{ fontSize: '11px', padding: '3px 8px', borderRadius: '12px', background: a.status==='done'?'rgba(16,185,129,.15)':'var(--pbg)', color: a.status==='done'?'var(--ok)':'var(--pd)' }}>{a.status==='done'?'✓ ':''}{a.description?.slice(0,30)}</span>)}
              </div>
            )}
          </div>
        ))}
    </div>}

    {openCreate && <RecoveryCreateModal clients={clients} users={users} onClose={() => setOpenCreate(false)} onCreated={() => { load(); setOpenCreate(false); toast?.('Plano criado.'); }} toast={toast} />}
    {selected && <RecoveryDetailModal plan={selected} users={users} onClose={() => { setSelected(null); load(); }} onChanged={load} toast={toast} />}
  </div>;
}

function RecoveryCreateModal({ clients, users, onClose, onCreated, toast }) {
  const [f, setF] = useState({ client_id: '', reason: '', expected_result: '', target_health_score: '70', next_review_date: '', responsible_user_id: '' });
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (!f.client_id || !f.reason.trim()) { toast?.('Cliente e motivo obrigatórios.', 'error'); return; }
    setBusy(true);
    try {
      await api('/recovery-plans', 'POST', { ...f, client_id: parseInt(f.client_id), target_health_score: parseInt(f.target_health_score) || 70, responsible_user_id: f.responsible_user_id ? parseInt(f.responsible_user_id) : null });
      onCreated();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };
  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr"><div><div className="modal-title">🎯 Novo Plano de Recuperação</div></div><button className="close-btn" onClick={onClose}>×</button></div>
      <form onSubmit={submit}><div className="modal-body">
        <div className="form-row">
          <div className="form-group"><label className="form-label">Cliente *</label>
            <select className="form-input" value={f.client_id} onChange={e => setF(p => ({ ...p, client_id: e.target.value }))}>
              <option value="">Selecione...</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name} (health: {c.health_score})</option>)}
            </select></div>
          <div className="form-group"><label className="form-label">Responsável (Gestor Comercial)</label>
            <select className="form-input" value={f.responsible_user_id} onChange={e => setF(p => ({ ...p, responsible_user_id: e.target.value }))}>
              <option value="">Não atribuído</option>{users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select></div>
        </div>
        <div className="form-group"><label className="form-label">Motivo do Risco / Problema a resolver *</label>
          <textarea className="form-input" value={f.reason} onChange={e => setF(p => ({ ...p, reason: e.target.value }))} placeholder="Qual situação motivou este plano?" /></div>
        <div className="form-group"><label className="form-label">Resultado Esperado</label>
          <textarea className="form-input" value={f.expected_result} onChange={e => setF(p => ({ ...p, expected_result: e.target.value }))} placeholder="O que define sucesso deste plano?" /></div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Target de Health Score</label>
            <input className="form-input" type="number" min="0" max="100" value={f.target_health_score} onChange={e => setF(p => ({ ...p, target_health_score: e.target.value }))} /></div>
          <div className="form-group"><label className="form-label">Data da Próxima Revisão</label>
            <input className="form-input" type="date" value={f.next_review_date} onChange={e => setF(p => ({ ...p, next_review_date: e.target.value }))} /></div>
        </div>
      </div>
      <div className="modal-footer"><button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button><button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Criar Plano</button></div>
      </form>
    </div>
  </div>;
}

function RecoveryDetailModal({ plan: initialPlan, users, onClose, onChanged, toast }) {
  const [p, setP] = useState(initialPlan);
  const [busy, setBusy] = useState(false);
  const [newAction, setNewAction] = useState({ description: '', responsible: '', due_date: '' });
  const [edit, setEdit] = useState({ next_review_date: initialPlan.next_review_date || '', expected_result: initialPlan.expected_result || '', leadership_notes: initialPlan.leadership_notes || '', client_communication: initialPlan.client_communication || '' });

  const reload = async () => { try { const d = await api(`/recovery-plans/${p.id}`); setP(d); onChanged?.(); } catch(e) {} };

  const changeStatus = async (status, final_result) => {
    setBusy(true);
    try { await api(`/recovery-plans/${p.id}/status`, 'PATCH', { status, final_result }); toast?.(`Status: ${RECOVERY_STATUS_LABEL[status]}.`); reload(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const saveEdit = async () => {
    setBusy(true);
    try { await api(`/recovery-plans/${p.id}`, 'PATCH', edit); toast?.('Plano atualizado.'); reload(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addAction = async () => {
    if (!newAction.description.trim()) return;
    setBusy(true);
    try { await api(`/recovery-plans/${p.id}/actions`, 'POST', newAction); setNewAction({ description: '', responsible: '', due_date: '' }); reload(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const toggleAction = async (actionId, currentStatus) => {
    const next = currentStatus === 'done' ? 'pending' : 'done';
    setBusy(true);
    try { await api(`/recovery-plans/${p.id}/actions/${actionId}`, 'PATCH', { status: next }); reload(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '700px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">🎯 Plano #{p.id} — {p.client_name}</div>
          <div className="modal-sub"><Pill>{RECOVERY_STATUS_LABEL[p.status]||p.status}</Pill> &nbsp; Health: {p.health_score} ({HEALTH_LABEL[p.health_status]})</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <p style={{ fontSize: '13px', color: 'var(--mid)', background: 'var(--bg)', padding: '12px', borderRadius: '8px', marginBottom: '14px' }}>{p.reason}</p>

        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '16px' }}>
          {p.status === 'open' && <button className="btn btn-sm btn-purple" disabled={busy} onClick={() => changeStatus('in_progress')}>▶ Iniciar</button>}
          {p.status === 'in_progress' && <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => changeStatus('awaiting_client')}>⏳ Aguardar cliente</button>}
          {['in_progress','awaiting_client'].includes(p.status) && <button className="btn btn-sm btn-purple" disabled={busy} onClick={() => changeStatus('completed')}>✓ Concluir</button>}
          {!['completed','cancelled'].includes(p.status) && <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => changeStatus('cancelled')}>✗ Cancelar</button>}
        </div>

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '14px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Ações do Plano</div>
          {p.actions?.map(a => (
            <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 0', borderBottom: '1px solid var(--line)' }}>
              <input type="checkbox" checked={a.status === 'done'} onChange={() => toggleAction(a.id, a.status)} />
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: '12px', textDecoration: a.status==='done'?'line-through':'none', color: a.status==='done'?'var(--muted)':'var(--dark)' }}>{a.description}</span>
                {(a.responsible || a.due_date) && <div style={{ fontSize: '11px', color: 'var(--muted)' }}>{a.responsible || ''}{a.responsible && a.due_date ? ' · ' : ''}{a.due_date || ''}</div>}
              </div>
              <Pill>{ACTION_STATUS_LABEL[a.status]||a.status}</Pill>
            </div>
          ))}
          <div style={{ display: 'flex', gap: '8px', marginTop: '10px' }}>
            <input className="form-input" value={newAction.description} onChange={e => setNewAction(p => ({ ...p, description: e.target.value }))} placeholder="Nova ação..." style={{ flex: 2 }} />
            <input className="form-input" value={newAction.responsible} onChange={e => setNewAction(p => ({ ...p, responsible: e.target.value }))} placeholder="Responsável" style={{ flex: 1 }} />
            <input className="form-input" type="date" value={newAction.due_date} onChange={e => setNewAction(p => ({ ...p, due_date: e.target.value }))} style={{ flex: 1 }} />
            <button className="btn btn-sm btn-purple" disabled={busy} onClick={addAction}>+</button>
          </div>
        </div>

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Gestão Comercial</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Próxima Revisão</label><input className="form-input" type="date" value={edit.next_review_date} onChange={e => setEdit(p => ({ ...p, next_review_date: e.target.value }))} /></div>
            <div className="form-group"><label className="form-label">Target Health Score</label><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '8px' }}>{p.target_health_score}</p></div>
          </div>
          <div className="form-group"><label className="form-label">Notas para o Gestor Comercial</label>
            <textarea className="form-input" value={edit.leadership_notes} onChange={e => setEdit(p => ({ ...p, leadership_notes: e.target.value }))} placeholder="O que o gestor comercial precisa saber e fazer?" /></div>
          <div className="form-group"><label className="form-label">Comunicação ao Cliente</label>
            <textarea className="form-input" value={edit.client_communication} onChange={e => setEdit(p => ({ ...p, client_communication: e.target.value }))} placeholder="O que foi ou será comunicado ao cliente?" /></div>
          <div className="form-group"><label className="form-label">Resultado Esperado</label>
            <textarea className="form-input" value={edit.expected_result} onChange={e => setEdit(p => ({ ...p, expected_result: e.target.value }))} /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveEdit}>Salvar</button>
        </div>
      </div>
    </div>
  </div>;
}

const REPORT_SECTIONS = [
  { id: 'chamados',     label: 'Chamados',           icon: '📋' },
  { id: 'sla',         label: 'SLA por Área',        icon: '⏰' },
  { id: 'aging',       label: 'Aging de Chamados',   icon: '📅' },
  { id: 'canal',       label: 'Canal de Origem',     icon: '📡' },
  { id: 'reclamacoes', label: 'Reclamações',          icon: '⚠️' },
  { id: 'devolucoes',  label: 'Devoluções',           icon: '📦' },
  { id: 'rma',         label: 'RMA',                 icon: '🔧' },
  { id: 'financeiro',  label: 'Financeiro',           icon: '💰' },
  { id: 'csat_nps',    label: 'CSAT / NPS',           icon: '⭐' },
  { id: 'clientes',    label: 'Clientes em Risco',    icon: '❤️' },
  { id: 'am',          label: 'Performance de AM',    icon: '👤' },
];

function ReportCard({ title, icon, children }) {
  return <div style={{ background:'#fff', borderRadius:'12px', boxShadow:'0 1px 3px rgba(0,0,0,.08)', overflow:'hidden', breakInside:'avoid', pageBreakInside:'avoid' }}>
    <div style={{ padding:'14px 16px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', gap:'8px' }}>
      <span>{icon}</span><span style={{ fontWeight:700, fontSize:'13px', color:'var(--dark)' }}>{title}</span>
    </div>
    <div style={{ padding:'14px 16px' }}>{children}</div>
  </div>;
}

function MiniTable({ headers, rows, emptyMsg }) {
  return <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'12px' }}>
    <thead><tr>{headers.map((h,i) => <th key={i} style={{ textAlign:'left', padding:'6px 8px', background:'var(--pbg)', color:'var(--pd)', fontWeight:700, borderBottom:'1px solid var(--line)' }}>{h}</th>)}</tr></thead>
    <tbody>{!rows?.length
      ? <tr><td colSpan={headers.length} style={{ padding:'14px', textAlign:'center', color:'var(--muted)' }}>{emptyMsg||'Sem dados.'}</td></tr>
      : rows.map((r,i) => <tr key={i} style={{ background:i%2===0?'#fff':'var(--bg)' }}>
          {r.map((c,j) => <td key={j} style={{ padding:'6px 8px', borderBottom:'1px solid var(--line)' }}>{c}</td>)}
        </tr>)}
    </tbody>
  </table>;
}

function ReportsView({ toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [period, setPeriod] = useState('30');
  const [selected, setSelected] = useState(new Set(REPORT_SECTIONS.map(s=>s.id)));

  const load = async (p) => {
    setLoading(true);
    try { setData(await api(`/dashboard/reports?period=${p||period}`)); }
    catch(e) { toast?.(e.message,'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, []);

  const toggleSection = (id) => setSelected(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const selectAll = () => setSelected(new Set(REPORT_SECTIONS.map(s=>s.id)));
  const clearAll = () => setSelected(new Set());

  const print = () => {
    const style = document.createElement('style');
    style.innerHTML = `@media print { .no-print { display:none!important; } body { background:#fff; } }`;
    document.head.appendChild(style);
    window.print();
    setTimeout(() => document.head.removeChild(style), 2000);
  };

  if (loading) return <div style={{ textAlign:'center', padding:'60px' }}><span className="spinner" /></div>;
  if (!data) return null;

  const d = data;
  const totalTickets = (d.tickets_by_status||[]).reduce((s,r)=>s+r.count,0);
  const totalRevRisk = (d.revenue_at_risk||[]).reduce((s,r)=>s+(parseFloat(r.total)||0),0);
  const totalOverdue = (d.sla_by_area||[]).reduce((s,r)=>s+r.overdue,0);
  const totalReturns = (d.returns_by_status||[]).reduce((s,r)=>s+r.count,0);
  const totalRma = (d.rma_by_status||[]).reduce((s,r)=>s+r.count,0);

  const has = (id) => selected.has(id);

  return <div className="section-grid">
    {/* CABEÇALHO E CONTROLES */}
    <div className="no-print" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'12px' }}>
      <div><div className="header-title">📈 Relatórios</div><div className="header-sub">Período: últimos {period} dias · {totalTickets} chamados registrados</div></div>
      <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>
        <select className="form-input" style={{ width:'140px' }} value={period} onChange={e => { setPeriod(e.target.value); load(e.target.value); }}>
          <option value="7">Últimos 7 dias</option><option value="30">Últimos 30 dias</option>
          <option value="60">Últimos 60 dias</option><option value="90">Últimos 90 dias</option>
          <option value="180">Últimos 6 meses</option>
        </select>
        <button className="btn btn-sm btn-outline" onClick={print}>🖨️ Imprimir</button>
      </div>
    </div>

    {/* SELETOR DE SEÇÕES */}
    <div className="no-print" style={{ background:'#fff', borderRadius:'12px', boxShadow:'0 1px 3px rgba(0,0,0,.08)', padding:'14px 16px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
        <span style={{ fontSize:'12px', fontWeight:700, color:'var(--dark)' }}>Selecionar relatórios para exibir / imprimir</span>
        <div style={{ display:'flex', gap:'6px' }}>
          <button className="btn btn-sm btn-outline" onClick={selectAll}>Todos</button>
          <button className="btn btn-sm btn-outline" onClick={clearAll}>Nenhum</button>
        </div>
      </div>
      <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
        {REPORT_SECTIONS.map(s => (
          <label key={s.id} onClick={() => toggleSection(s.id)} style={{ display:'flex', alignItems:'center', gap:'5px', padding:'5px 10px', borderRadius:'20px', border:`1.5px solid ${selected.has(s.id)?'var(--p)':'var(--line)'}`, background:selected.has(s.id)?'var(--pbg)':'#fff', cursor:'pointer', fontSize:'12px', fontWeight:selected.has(s.id)?700:400, color:selected.has(s.id)?'var(--pd)':'var(--mid)' }}>
            {selected.has(s.id)?'✓ ':''}{s.icon} {s.label}
          </label>
        ))}
      </div>
    </div>

    {/* KPIs SUMÁRIO */}
    <div className="grid-3" style={{ pageBreakInside:'avoid' }}>
      <div className="metric-card"><div className="metric-label">📋 Total de Chamados</div><div className="metric-value">{totalTickets}</div><div className="metric-sub">últimos {period} dias</div></div>
      <div className="metric-card"><div className="metric-label">⏰ SLA Vencido</div><div className="metric-value" style={{ color:totalOverdue>0?'var(--red)':undefined }}>{totalOverdue}</div><div className="metric-sub">chamados em overdue</div></div>
      <div className="metric-card"><div className="metric-label">💰 Receita em Risco</div><div className="metric-value" style={{ fontSize:'18px', color:totalRevRisk>0?'var(--red)':undefined }}>{formatMoney(totalRevRisk)}</div><div className="metric-sub">chamados abertos</div></div>
      <div className="metric-card"><div className="metric-label">📦 Devoluções</div><div className="metric-value">{totalReturns}</div><div className="metric-sub">registradas no período</div></div>
      <div className="metric-card"><div className="metric-label">🔧 RMAs</div><div className="metric-value">{totalRma}</div><div className="metric-sub">registrados no período</div></div>
      <div className="metric-card"><div className="metric-label">⭐ CSAT Médio</div><div className="metric-value">{d.csat_by_client?.length ? (d.csat_by_client.reduce((s,c)=>s+parseFloat(c.csat_avg||0),0)/d.csat_by_client.length).toFixed(1)+'/5' : '—'}</div><div className="metric-sub">por cliente (top 10)</div></div>
    </div>

    {/* SEÇÕES DE RELATÓRIO */}
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px' }}>

      {has('chamados') && <ReportCard title="Chamados por Status" icon="📋">
        {d.tickets_by_status?.length
          ? <><MiniTable headers={['Status','Qtd']} rows={d.tickets_by_status.map(r=>[TICKET_STATUS_LABEL[r.status]||r.status, r.count])} />
            {ResponsiveContainer && <ResponsiveContainer width="100%" height={160}><BarChart data={d.tickets_by_status} margin={{top:8,right:4,left:-24,bottom:0}}><CartesianGrid strokeDasharray="3 3" stroke="var(--line)"/><XAxis dataKey="status" tick={{fontSize:9}} tickFormatter={v=>(TICKET_STATUS_LABEL[v]||v).slice(0,8)} /><YAxis tick={{fontSize:9}}/><Tooltip formatter={(v,n,p)=>[v,TICKET_STATUS_LABEL[p.payload.status]||p.payload.status]}/><Bar dataKey="count" fill="var(--p)" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>}</>
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem dados.</p>}
      </ReportCard>}

      {has('sla') && <ReportCard title="SLA por Área" icon="⏰">
        <MiniTable headers={['Área','No Prazo','Vencido']}
          rows={(d.sla_by_area||[]).map(r=>[r.area, <span style={{color:'var(--ok)',fontWeight:600}}>{r.on_time}</span>, r.overdue>0?<span style={{color:'var(--red)',fontWeight:600}}>{r.overdue}</span>:'—'])} />
      </ReportCard>}

      {has('aging') && <ReportCard title="Aging de Chamados Abertos" icon="📅">
        {d.aging_buckets ? <MiniTable headers={['Faixa','Qtd']} rows={[
          ['< 1 dia', d.aging_buckets.d0_1||0],
          ['1–3 dias', d.aging_buckets.d1_3||0],
          ['3–7 dias', d.aging_buckets.d3_7||0],
          ['> 7 dias', <span style={{color:'var(--red)',fontWeight:600}}>{d.aging_buckets.d7_plus||0}</span>],
        ]} /> : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem dados.</p>}
      </ReportCard>}

      {has('canal') && <ReportCard title="Canal de Origem" icon="📡">
        <MiniTable headers={['Canal','Qtd']} rows={(d.channel_distribution||[]).map(r=>[r.channel, r.count])} />
      </ReportCard>}

      {has('reclamacoes') && <ReportCard title="Reclamações por Tipo" icon="⚠️">
        <MiniTable headers={['Tipo','Qtd']} rows={(d.complaints_by_type||[]).map(r=>[
          COMPLAINT_TYPES.find(t=>t.v===r.type)?.l||r.type, r.count])} />
      </ReportCard>}

      {has('reclamacoes') && <ReportCard title="Área Causadora de Reclamações" icon="🏢">
        <MiniTable headers={['Área','Qtd']} rows={(d.complaints_by_causing_area||[]).map(r=>[r.causing_area, r.count])} />
      </ReportCard>}

      {has('reclamacoes') && <ReportCard title="Clientes com Mais Reclamações" icon="👥">
        <MiniTable headers={['Cliente','Reclamações']} rows={(d.top_complaint_clients||[]).map(r=>[r.name, r.complaint_count])} />
      </ReportCard>}

      {has('devolucoes') && <ReportCard title="Devoluções por Status" icon="📦">
        <MiniTable headers={['Status','Qtd']} rows={(d.returns_by_status||[]).map(r=>[RETURN_LABEL[r.status]||r.status, r.count])} />
      </ReportCard>}

      {has('devolucoes') && <ReportCard title="Causa Raiz de Devoluções" icon="🔍">
        {d.returns_root_cause?.length
          ? <MiniTable headers={['Causa','Qtd']} rows={d.returns_root_cause.map(r=>[r.root_cause, r.count])} />
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Nenhuma causa raiz registrada ainda.</p>}
      </ReportCard>}

      {has('rma') && <ReportCard title="RMA por Status" icon="🔧">
        <MiniTable headers={['Status','Qtd']} rows={(d.rma_by_status||[]).map(r=>[RMA_LABEL[r.status]||r.status, r.count])} />
      </ReportCard>}

      {has('rma') && <ReportCard title="Produtos com Mais Reincidência de RMA" icon="↻">
        {d.rma_recurrence?.length
          ? <MiniTable headers={['Produto','Qtd']} rows={d.rma_recurrence.map(r=>[r.product_name||r.product_code||'—', <span className="badge badge-recurrence">↻ {r.count||r.total}x</span>])} />
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem reincidência no período.</p>}
      </ReportCard>}

      {has('financeiro') && <ReportCard title="Receita em Risco por Cliente" icon="💰">
        <MiniTable headers={['Cliente','Receita em Risco']} rows={(d.revenue_at_risk||[]).map(r=>[r.name, <span style={{color:'var(--red)',fontWeight:600}}>{formatMoney(r.total)}</span>])} />
      </ReportCard>}

      {has('csat_nps') && <ReportCard title="CSAT por Cliente (menor primeiro)" icon="⭐">
        {d.csat_by_client?.length
          ? <MiniTable headers={['Cliente','CSAT Médio','Respostas']} rows={d.csat_by_client.map(r=>[
              r.name,
              <span style={{fontWeight:700, color:parseFloat(r.csat_avg)>=4?'var(--ok)':parseFloat(r.csat_avg)>=3?'#F59E0B':'var(--red)'}}>{r.csat_avg}/5</span>,
              r.responses
            ])} />
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem respostas CSAT no período.</p>}
      </ReportCard>}

      {has('csat_nps') && <ReportCard title="Tendência NPS (semanal)" icon="📊">
        {d.nps_trend?.length
          ? <>{ResponsiveContainer && <ResponsiveContainer width="100%" height={160}><LineChart data={d.nps_trend} margin={{top:8,right:4,left:-24,bottom:0}}><CartesianGrid strokeDasharray="3 3" stroke="var(--line)"/><XAxis dataKey="week" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}} domain={[-100,100]}/><Tooltip/><Line type="monotone" dataKey="nps_score" stroke="var(--p)" strokeWidth={2} dot={false}/></LineChart></ResponsiveContainer>}<MiniTable headers={['Semana','NPS']} rows={d.nps_trend.map(r=>[r.week, <span style={{fontWeight:700, color:r.nps_score>=0?'var(--ok)':'var(--red)'}}>{r.nps_score}</span>])} /></>
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem dados de NPS no período.</p>}
      </ReportCard>}

      {has('clientes') && <ReportCard title="Clientes em Risco (Health Score)" icon="❤️">
        <MiniTable headers={['Cliente','Score','Status']}
          rows={(d.client_risk_list||[]).map(r=>[r.name, <span style={{fontWeight:700, color:HEALTH_COLOR[r.health_status]}}>{r.health_score}</span>, HEALTH_LABEL[r.health_status]])} />
      </ReportCard>}

      {has('am') && <ReportCard title="Performance de AM/BDM" icon="👤">
        {d.am_performance?.length
          ? <MiniTable headers={['AM/BDM','Chamados','Receita Aberta','Tempo Médio (h)']}
              rows={d.am_performance.map(r=>[r.name, r.tickets_managed, r.open_revenue_at_risk>0?<span style={{color:'var(--red)'}}>{formatMoney(r.open_revenue_at_risk)}</span>:'—', r.avg_resolution_hours??'—'])} />
          : <p style={{fontSize:'12px',color:'var(--muted)'}}>Sem dados — associe AMs aos chamados para ver esta métrica.</p>}
      </ReportCard>}

    </div>
  </div>;
}

function SettingsView({ toast }) {
  const me = getUser();
  const isAdmin = me?.role === 'admin';
  const [tab, setTab] = useState('users');
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openCreate, setOpenCreate] = useState(false);
  const [editing, setEditing] = useState(null);
  const [resetPass, setResetPass] = useState(null);

  const loadUsers = async () => {
    if (!isAdmin) return;
    setLoading(true);
    try { setUsers(await api('/users')); }
    catch(e) { toast?.(e.message,'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { loadUsers(); }, []);

  return <div className="section-grid">
    <div><div className="header-title">⚙️ Configurações</div><div className="header-sub">Usuários, permissões e parâmetros do sistema</div></div>

    <div className="tabbar">
      <div className={`tabbar-item ${tab==='users'?'active':''}`} onClick={() => setTab('users')}>Usuários</div>
      <div className={`tabbar-item ${tab==='roles'?'active':''}`} onClick={() => setTab('roles')}>Níveis de Acesso</div>
      <div className={`tabbar-item ${tab==='my'?'active':''}`} onClick={() => setTab('my')}>Minha Conta</div>
    </div>

    {tab === 'users' && <>
      {!isAdmin ? <div style={{ padding:'20px', background:'var(--pbg)', borderRadius:'12px', fontSize:'13px', color:'var(--pd)' }}>⚠️ Apenas administradores podem gerenciar usuários.</div> : <>
        <div style={{ display:'flex', justifyContent:'flex-end' }}>
          <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Novo Usuário</button>
        </div>
        <div className="table-container">
          <table className="table">
            <thead><tr><th>Nome</th><th>Login</th><th>Papel</th><th>Departamento</th><th>Último acesso</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>
              {loading ? <tr><td colSpan="7" style={{textAlign:'center',padding:'20px'}}><span className="spinner"/></td></tr> :
                !users.length ? <tr><td colSpan="7" style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>Nenhum usuário.</td></tr> :
                users.map(u => <tr key={u.id}>
                  <td style={{fontWeight:600}}>{u.name}{u.title && <div style={{fontSize:'11px',color:'var(--muted)',fontWeight:400}}>{u.title}</div>}</td>
                  <td style={{fontFamily:'monospace',fontSize:'12px'}}>{u.login}</td>
                  <td><span className="badge badge-status">{ROLES.find(r=>r.v===u.role)?.l||u.role}</span></td>
                  <td style={{fontSize:'12px',color:'var(--muted)'}}>{u.department||'—'}</td>
                  <td style={{fontSize:'11px',color:'var(--muted)'}}>{u.last_login_at?formatDate(u.last_login_at):'Nunca'}</td>
                  <td><span style={{fontWeight:600, color:u.is_active?'var(--ok)':'var(--muted)'}}>{u.is_active?'✓ Ativo':'✗ Inativo'}</span></td>
                  <td style={{display:'flex',gap:'4px'}}>
                    <button className="btn btn-sm btn-outline" onClick={() => setEditing(u)}>Editar</button>
                    <button className="btn btn-sm btn-outline" onClick={() => setResetPass(u)}>Senha</button>
                  </td>
                </tr>)}
            </tbody>
          </table>
        </div>
      </>}
    </>}

    {tab === 'roles' && <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
      {ROLES.map(r => <div key={r.v} style={{ background:'#fff', borderRadius:'12px', boxShadow:'0 1px 3px rgba(0,0,0,.08)', padding:'14px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div><div style={{fontWeight:700, fontSize:'13px'}}>{r.l}</div><div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>{r.desc}</div></div>
        <span className="badge badge-status" style={{fontFamily:'monospace'}}>{r.v}</span>
      </div>)}
      <p style={{fontSize:'12px',color:'var(--muted)',marginTop:'8px'}}>Permissões são validadas no backend — alterar o papel de um usuário tem efeito imediato em todas as rotas protegidas.</p>
    </div>}

    {tab === 'my' && <MyAccountSection toast={toast} />}

    {openCreate && <UserFormModal onClose={() => setOpenCreate(false)} onSaved={() => { loadUsers(); setOpenCreate(false); toast?.('Usuário criado.'); }} toast={toast} />}
    {editing && <UserFormModal user={editing} onClose={() => setEditing(null)} onSaved={() => { loadUsers(); setEditing(null); toast?.('Usuário atualizado.'); }} toast={toast} />}
    {resetPass && <ResetPasswordModal user={resetPass} onClose={() => setResetPass(null)} onSaved={() => { setResetPass(null); toast?.('Senha redefinida.'); }} toast={toast} />}
  </div>;
}

function MyAccountSection({ toast }) {
  const [me, setMe] = useState(null);
  useEffect(() => { (async () => { try { setMe(await api('/users/me')); } catch(e) {} })(); }, []);
  if (!me) return <div style={{textAlign:'center',padding:'30px'}}><span className="spinner"/></div>;
  return <div style={{ background:'#fff', borderRadius:'12px', boxShadow:'0 1px 3px rgba(0,0,0,.08)', padding:'20px', maxWidth:'480px' }}>
    <div style={{fontWeight:700, fontSize:'16px', marginBottom:'4px'}}>{me.name}</div>
    <div style={{fontSize:'13px', color:'var(--muted)', marginBottom:'16px'}}>{ROLES.find(r=>r.v===me.role)?.l||me.role} · @{me.login}</div>
    {me.email && <div style={{fontSize:'13px', color:'var(--mid)', marginBottom:'8px'}}>📧 {me.email}</div>}
    {me.title && <div style={{fontSize:'13px', color:'var(--mid)'}}>🏷️ {me.title}</div>}
    <div style={{marginTop:'16px',borderTop:'1px solid var(--line)',paddingTop:'14px'}}>
      <p style={{fontSize:'12px',color:'var(--muted)'}}>Para alterar sua senha, peça ao administrador do sistema.</p>
    </div>
  </div>;
}

function UserFormModal({ user, onClose, onSaved, toast }) {
  const isEdit = !!user;
  const [f, setF] = useState({
    name: user?.name||'', email: user?.email||'', login: user?.login||'',
    role: user?.role||'support', title: user?.title||'', department: user?.department||'',
    phone: user?.phone||'', is_active: user?.is_active!==false, password: '', access_level: user?.access_level||'standard'
  });
  const [busy, setBusy] = useState(false);
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const submit = async (e) => {
    e.preventDefault();
    if (!f.name.trim() || !f.login.trim() || (!isEdit && !f.password)) {
      toast?.(`Nome, login${isEdit?'':' e senha'} obrigatórios.`,'error'); return;
    }
    setBusy(true);
    try {
      if (isEdit) {
        const payload = { name:f.name, email:f.email||null, role:f.role, title:f.title||null, department:f.department||null, phone:f.phone||null, is_active:f.is_active, access_level:f.access_level };
        await api(`/users/${user.id}`, 'PATCH', payload);
      } else {
        await api('/users', 'POST', { ...f, password:f.password, email:f.email||null, title:f.title||null, department:f.department||null, phone:f.phone||null });
      }
      onSaved();
    } catch(e) { toast?.(e.message,'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target===e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">{isEdit?`Editar ${user.name}`:'Novo Usuário'}</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit}><div className="modal-body">
        <div className="form-row">
          <div className="form-group"><label className="form-label">Nome completo *</label><input className="form-input" value={f.name} onChange={e=>set('name',e.target.value)} /></div>
          <div className="form-group"><label className="form-label">Login *</label><input className="form-input" value={f.login} onChange={e=>set('login',e.target.value)} disabled={isEdit} style={{opacity:isEdit?.6:1}} /></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">E-mail</label><input className="form-input" type="email" value={f.email} onChange={e=>set('email',e.target.value)} /></div>
          <div className="form-group"><label className="form-label">Telefone / WhatsApp</label><input className="form-input" value={f.phone} onChange={e=>set('phone',e.target.value)} /></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Papel (role) *</label>
            <select className="form-input" value={f.role} onChange={e=>set('role',e.target.value)}>
              {ROLES.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
            </select></div>
          <div className="form-group"><label className="form-label">Cargo / Título</label><input className="form-input" value={f.title} onChange={e=>set('title',e.target.value)} placeholder="ex: Analista CSO" /></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Departamento</label><input className="form-input" value={f.department} onChange={e=>set('department',e.target.value)} /></div>
          <div className="form-group"><label className="form-label">Nível de Acesso</label>
            <select className="form-input" value={f.access_level} onChange={e=>set('access_level',e.target.value)}>
              <option value="standard">Standard</option><option value="elevated">Elevated</option><option value="restricted">Restricted</option>
            </select></div>
        </div>
        {!isEdit && <div className="form-group"><label className="form-label">Senha inicial *</label><input className="form-input" type="password" value={f.password} onChange={e=>set('password',e.target.value)} placeholder="Mínimo 6 caracteres" /></div>}
        {isEdit && <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'13px'}}>
          <input type="checkbox" checked={f.is_active} onChange={e=>set('is_active',e.target.checked)} />
          Usuário ativo
        </label>}
      </div>
      <div className="modal-footer">
        <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
        <button type="submit" className="btn btn-purple" disabled={busy}>{busy&&<span className="spinner" style={{marginRight:'6px'}}/>}✓ {isEdit?'Salvar':'Criar Usuário'}</button>
      </div></form>
    </div>
  </div>;
}

function ResetPasswordModal({ user, onClose, onSaved, toast }) {
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (password.length < 6) { toast?.('Mínimo 6 caracteres.','error'); return; }
    setBusy(true);
    try { await api(`/users/${user.id}/password`, 'PATCH', { password }); onSaved(); }
    catch(e) { toast?.(e.message,'error'); }
    finally { setBusy(false); }
  };
  return <div className="modal" onClick={e => e.target===e.currentTarget && onClose()}>
    <div className="modal-content" style={{maxWidth:'400px'}}>
      <div className="modal-hdr"><div><div className="modal-title">Redefinir Senha — {user.name}</div></div><button className="close-btn" onClick={onClose}>×</button></div>
      <form onSubmit={submit}><div className="modal-body">
        <div className="form-group"><label className="form-label">Nova Senha *</label><input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Mínimo 6 caracteres" autoFocus /></div>
        <p style={{fontSize:'12px',color:'var(--muted)'}}>O usuário precisará usar esta senha no próximo login.</p>
      </div>
      <div className="modal-footer">
        <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
        <button type="submit" className="btn btn-purple" disabled={busy}>{busy&&<span className="spinner" style={{marginRight:'6px'}}/>}✓ Redefinir</button>
      </div></form>
    </div>
  </div>;
}

  const [view, setView] = useState('dashboard');
  const user = getUser();
  const { toasts, push } = useToasts();

  if (!user) return <LoginScreen />;

  const navItems = [
    { id: 'dashboard', label: 'Dashboard Executivo', icon: '📊', section: 'VISÃO' },
    { id: 'torre', label: 'Torre de Controle', icon: '🚨', badge: 3 },
    { id: 'tickets', label: 'Chamados', icon: '📋', badge: 9 },
    { id: 'complaints', label: 'Reclamações', icon: '⚠️', badge: 5 },
    { id: 'returns', label: 'Devoluções', icon: '📦', badge: 6 },
    { id: 'rma', label: 'RMA', icon: '🔧' },
    { id: 'clients360', label: 'Cliente 360', icon: '👁️', section: 'CLIENTES' },
    { id: 'health', label: 'Health Score', icon: '❤️' },
    { id: 'csat', label: 'CSAT / NPS', icon: '⭐' },
    { id: 'recovery', label: 'Planos de Recuperação', icon: '🎯' },
    { id: 'reports', label: 'Relatórios', icon: '📈', section: 'GESTÃO' },

  return <div className="app-container">
    <div className="sidebar">
      <div className="sidebar-section">

          <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'var(--p)' }}></div>
          <div style={{ fontSize: '13px', fontWeight: '700', color: '#fff' }}>Nextra CSO Hub</div>
          <div style={{ fontSize: '9px', color: 'rgba(255,255,255,.5)', marginLeft: 'auto' }}>v1.1</div>
        </div>
      </div>

      {navItems.map(item => (
        item.section ? (
          <div key={item.id} className="sidebar-label">{item.section}</div>

          <div key={item.id} className="sidebar-item" style={{ background: view === item.id ? 'var(--p)' : 'transparent', color: view === item.id ? '#fff' : 'rgba(255,255,255,.7)' }} onClick={() => setView(item.id)}>
            <span>{item.icon}</span>
            <span style={{ flex: 1 }}>{item.label}</span>
            {item.badge && <div className="sidebar-badge">{item.badge}</div>}
          </div>
        )
      ))}

      <div className="sidebar-section" style={{ marginTop: '24px', paddingTop: '24px', borderTop: '1px solid rgba(255,255,255,.1)' }}>
        <div className="sidebar-item" onClick={() => { localStorage.clear(); window.location.href = '/'; }}>
          <span>🚪</span>
          <span>Sair</span>
        </div>
      </div>
    </div>

    <div className="main-area">
      <div className="header">
        <div>
          <div className="header-title">{navItems.find(i => i.id === view)?.label}</div>
          <div className="header-sub">Últimas ações • {new Date().toLocaleDateString('pt-BR')}</div>
        </div>
        <div className="user-badge">
          <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'var(--p)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: '14px', fontWeight: '700' }}>{user.name.charAt(0)}</div>
          <span>{user.name}</span>
        </div>
      </div>

      <div className="content">
        {view === 'dashboard' && <DashboardExecutivo />}
        {view === 'torre' && <ControlTowerView toast={push} />}
        {view === 'tickets' && <TicketsView toast={push} />}
        {view === 'complaints' && <ComplaintsView toast={push} />}
        {view === 'returns' && <ReturnsView toast={push} />}
        {view === 'rma' && <RMAView toast={push} />}
        {view === 'clients360' && <Clients360View toast={push} />}
        {view === 'health' && <HealthScoreView toast={push} />}
        {view === 'csat' && <CsatNpsView toast={push} />}
        {view === 'recovery' && <RecoveryPlansView toast={push} />}
        {view === 'reports' && <ReportsView toast={push} />}
        {view === 'settings' && <SettingsView toast={push} />}
      </div>
    </div>
    <Toasts toasts={toasts} />
  </div>;
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
