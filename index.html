<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nextra CSO Hub — v1.1</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <style>
    :root {
      --p: #6D40E6;
      --pd: #5030C6;
      --pbg: #F8F6FF;
      --bg: #FAFAF9;
      --dark: #1A1730;
      --dark2: #2D1B4E;
      --mid: #6B6990;
      --ink: #2D2536;
      --line: #E4E0F5;
      --muted: #9B94B3;
      --red: #DC2626;
      --ok: #10B981;
      --warn: #F59E0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system,'Inter',sans-serif; }
    html, body { width: 100%; height: 100%; background: var(--dark); color: var(--ink); }
    #root { width: 100%; height: 100%; }
    .app-container { display: flex; width: 100vw; height: 100vh; }
    .sidebar { width: 280px; background: var(--dark2); color: #fff; overflow-y: auto; padding: 24px 0; border-right: 1px solid rgba(255,255,255,.1); }
    .sidebar-section { padding: 0 16px; margin-bottom: 24px; }
    .sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,.5); margin-bottom: 8px; display: block; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,.7); transition: .12s; position: relative; }
    .sidebar-item:hover { background: rgba(255,255,255,.1); color: #fff; }
    .sidebar-item.active { background: var(--p); color: #fff; font-weight: 600; }
    .sidebar-badge { position: absolute; right: 8px; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 20px; text-align: center; }
    .main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .header { padding: 20px 28px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: #fff; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--dark); }
    .header-sub { font-size: 12px; color: var(--mid); margin-top: 2px; }
    .user-badge { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--pbg); border-radius: 8px; }
    .user-badge span { font-size: 12px; font-weight: 600; color: var(--pd); }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .section-grid { display: grid; gap: 20px; }
    .alert-card { background: #fff; border-radius: 12px; padding: 16px; display: flex; gap: 12px; align-items: flex-start; border-left: 4px solid var(--warn); box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; transition: .15s; }
    .alert-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .alert-body { flex: 1; }
    .alert-title { font-size: 13px; font-weight: 700; color: var(--dark); }
    .alert-desc { font-size: 12px; color: var(--mid); margin-top: 2px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .badge-critical { background: rgba(220,38,38,.1); color: var(--red); }
    .badge-high { background: rgba(245,158,11,.1); color: #D97706; }
    .badge-medium { background: rgba(59,130,246,.1); color: #3B82F6; }
    .badge-low { background: rgba(16,185,129,.1); color: var(--ok); }
    .badge-status { background: var(--pbg); color: var(--pd); }
    .badge-recurrence { background: rgba(220,38,38,.1); color: var(--red); }
    .timeline { display: flex; flex-direction: column; gap: 0; margin-top: 8px; }
    .timeline-item { position: relative; padding: 0 0 18px 22px; border-left: 2px solid var(--line); }
    .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }
    .timeline-dot { position: absolute; left: -6px; top: 2px; width: 10px; height: 10px; border-radius: 50%; background: var(--p); }
    .timeline-action { font-size: 12px; font-weight: 700; color: var(--dark); }
    .timeline-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .timeline-note { font-size: 12px; color: var(--mid); margin-top: 4px; line-height: 1.5; white-space: pre-wrap; }
    .tabbar { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
    .tabbar-item { padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; }
    .tabbar-item.active { color: var(--pd); border-bottom-color: var(--p); }
    .cost-box { background: var(--bg); border-radius: 9px; padding: 14px; }
    .cost-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; color: var(--mid); border-bottom: 1px dashed var(--line); }
    .cost-row.total { font-weight: 700; color: var(--dark); border-bottom: none; padding-top: 10px; font-size: 13px; }
    .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .12s; outline: none; }
    .btn-purple { background: var(--p); color: #fff; }
    .btn-purple:hover { background: var(--pd); }
    .btn-purple:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline { border: 1px solid var(--line); background: #fff; color: var(--mid); }
    .btn-outline:hover { border-color: var(--p); color: var(--p); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .table-container { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .table { width: 100%; border-collapse: collapse; }
    .table th { background: var(--bg); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--line); }
    .table td { padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 13px; color: var(--ink); }
    .table tr:hover { background: var(--pbg); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z: 1000; padding: 20px; }
    .modal-content { background: #fff; border-radius: 16px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-hdr { padding: 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: flex-start; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--dark); }
    .modal-sub { font-size: 12px; color: var(--mid); margin-top: 4px; }
    .close-btn { background: none; border: none; font-size: 24px; color: var(--muted); cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .close-btn:hover { color: var(--dark); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 20px 24px; border-top: 1px solid var(--line); display: flex; gap: 12px; justify-content: flex-end; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--mid); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; color: var(--ink); background: #fff; outline: none; transition: .12s; font-family: inherit; }
    .form-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--pbg); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; background: #fff; transition: .12s; }
    .checkbox-item input { display: none; }
    .checkbox-item input:checked + label { display: none; }
    .checkbox-item input:checked ~ label:after { content: ' ✓'; color: var(--p); }
    .checkbox-item input:checked { border-color: var(--p); background: var(--pbg); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #fff; padding: 14px 18px; border-radius: 8px; font-size: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.15); z: 999; animation: slideIn .3s ease-out; }
    @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast.success { border-left: 3px solid var(--ok); color: #065F46; }
    .toast.error { border-left: 3px solid var(--red); color: #7F1D1D; }
    .toast.info { border-left: 3px solid var(--p); color: var(--pd); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .metric-card { background: linear-gradient(135deg, var(--pbg) 0%, #fff 100%); border-radius: 12px; padding: 18px; border: 1px solid var(--line); }
    .metric-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--mid); letter-spacing: .05em; }
    .metric-value { font-size: 24px; font-weight: 700; color: var(--dark); margin-top: 6px; }
    .metric-sub { font-size: 12px; color: var(--mid); margin-top: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(109,64,230,.25); border-top-color: var(--p); border-radius: 50%; animation: spin .6s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect, useCallback, useContext, createContext } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts || {};

// ══════════════════════════════════════════════════════════════
// HELPERS & CONTEXT
// ══════════════════════════════════════════════════════════════

const API_BASE = '/api/v1';
const TOKEN = localStorage.getItem('token');

const api = async (path, method='GET', body=null) => {
  const opts = { method, headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if (r.status === 401) { localStorage.clear(); window.location.href = '/'; }
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${r.status}`);
  }
  return r.json();
};

const getUser = () => { const d = localStorage.getItem('user'); return d ? JSON.parse(d) : null; };

const formatCPF = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/g, '$1.$2.$3/$4-$5');
const formatMoney = (v) => `R$ ${(parseFloat(v)||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
const formatPhone = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d{4,5})(\d{4})/g, '($1) $2-$3');
const formatDate = (v) => v ? new Date(v).toLocaleString('pt-BR') : '—';

const SEVERITY_CLASS = { critical: 'badge-critical', high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };
function Pill({ children, tone }) {
  const cls = SEVERITY_CLASS[tone] || 'badge-status';
  return <span className={`badge ${cls}`}>{children}</span>;
}

function Timeline({ items }) {
  if (!items || !items.length) return <p style={{ fontSize: '12px', color: 'var(--muted)' }}>Sem histórico ainda.</p>;
  return <div className="timeline">
    {items.map((h, i) => (
      <div className="timeline-item" key={h.id || i}>
        <div className="timeline-dot"></div>
        <div className="timeline-action">{h.action}</div>
        <div className="timeline-meta">{h.user_name || 'Sistema'} • {formatDate(h.created_at)}</div>
        {h.note && <div className="timeline-note">{h.note}</div>}
      </div>
    ))}
  </div>;
}

function Toasts({ toasts }) {
  return <>{toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</>;
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = (msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  };
  return { toasts, push };
}

const AppContext = createContext();

// ══════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════════════════

function LoginScreen() {
  const [login, setLogin] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    if (!login || !password) { setErr('Preencha login e senha.'); return; }
    setBusy(true); setErr('');
    try {
      const { token, user } = await api('/auth/login', 'POST', { login, password });
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
      window.location.reload();
    } catch(e) { setErr(e.message||'Erro de login'); }
    finally { setBusy(false); }
  };

  return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: 'linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%)' }}>
    <form onSubmit={submit} style={{ background: '#fff', borderRadius: '16px', padding: '32px', maxWidth: '360px', width: '100%', boxShadow: '0 20px 60px rgba(0,0,0,.3)' }}>
      <div style={{ marginBottom: '24px' }}>
        <div style={{ fontSize: '24px', fontWeight: '800', color: 'var(--dark)', marginBottom: '4px' }}>📋 Nextra CSO Hub</div>
        <div style={{ fontSize: '12px', color: 'var(--mid)' }}>Customer Success & Operations</div>
      </div>
      {err && <div style={{ background: '#FEF2F2', color: 'var(--red)', padding: '10px 12px', borderRadius: '8px', fontSize: '12px', marginBottom: '16px' }}>{err}</div>}
      <div style={{ marginBottom: '16px' }}>
        <label style={{ display: 'block', fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '6px' }}>Login</label>
        <input type="text" value={login} onChange={e=>setLogin(e.target.value)} placeholder="seu login" style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--line)', borderRadius: '8px', fontSize: '13px' }} />
      </div>
      <div style={{ marginBottom: '20px' }}>
        <label style={{ display: 'block', fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '6px' }}>Senha</label>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="sua senha" style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--line)', borderRadius: '8px', fontSize: '13px' }} />
      </div>
      <button type="submit" className="btn btn-purple" style={{ width: '100%' }} disabled={busy}>
        {busy && <span className="spinner" style={{ marginRight: '6px' }} />}
        Entrar
      </button>
    </form>
  </div>;
}

// ══════════════════════════════════════════════════════════════
// DASHBOARD EXECUTIVO (TORRE DE CONTROLE)
// ══════════════════════════════════════════════════════════════

function DashboardExecutivo({ onViewTicket, onViewComplaint }) {
  const [kpis, setKpis] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const { tickets_by_status, tickets_by_area, revenue_at_risk, rma_by_status, complaints_by_type } = await api('/dashboard/reports?period=7');
        setKpis({ tickets_by_status, tickets_by_area, revenue_at_risk, rma_by_status, complaints_by_type });
      } catch(e) { console.error(e); }
      finally { setLoading(false); }
    })();
  }, []);

  if (loading) return <div style={{ padding: '20px', textAlign: 'center' }}>Carregando...</div>;

  const openTickets = (kpis?.tickets_by_status||[]).find(s => s.status === 'new')?.count || 0;
  const criticalTickets = (kpis?.tickets_by_area||[]).reduce((s, a) => s + (a.area === 'support' ? a.count : 0), 0);
  const totalRevAtRisk = (kpis?.revenue_at_risk||[]).reduce((s, c) => s + c.total, 0);
  const openRMAs = (kpis?.rma_by_status||[]).find(r => r.status === 'requested')?.count || 0;

  return <div className="section-grid">
    <div className="grid-3">
      <div className="metric-card">
        <div className="metric-label">🔔 Chamados Abertos</div>
        <div className="metric-value">{openTickets}</div>
        <div className="metric-sub">últimos 7 dias</div>
      </div>
      <div className="metric-card">
        <div className="metric-label">🔴 SLA Crítico</div>
        <div className="metric-value" style={{ color: 'var(--red)' }}>{criticalTickets}</div>
        <div className="metric-sub">próximas 24h</div>
      </div>
      <div className="metric-card">
        <div className="metric-label">💰 Receita em Risco</div>
        <div className="metric-value" style={{ fontSize: '18px' }}>{formatMoney(totalRevAtRisk)}</div>
        <div className="metric-sub">{(kpis?.revenue_at_risk||[]).length} clientes</div>
      </div>
    </div>
    
    {kpis?.tickets_by_status && kpis.tickets_by_status.length > 0 && (
      <div className="table-container">
        <div style={{ padding: '16px', borderBottom: '1px solid var(--line)', fontSize: '13px', fontWeight: '700', color: 'var(--dark)' }}>Distribuição de Chamados por Status (últimos 7 dias)</div>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={kpis.tickets_by_status}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--line)" />
            <XAxis dataKey="status" stroke="var(--mid)" style={{ fontSize: '12px' }} />
            <YAxis stroke="var(--mid)" style={{ fontSize: '12px' }} />
            <Tooltip contentStyle={{ background: '#fff', border: '1px solid var(--line)', borderRadius: '8px', fontSize: '12px' }} />
            <Bar dataKey="count" fill="var(--p)" radius={[8,8,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    )}
  </div>;
}

// ══════════════════════════════════════════════════════════════
// CHAMADOS (TICKETS)
// ══════════════════════════════════════════════════════════════

function TicketsView() {
  const [tickets, setTickets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openCreateModal, setOpenCreateModal] = useState(false);
  const [selectedTicket, setSelectedTicket] = useState(null);

  useEffect(() => {
    loadTickets();
  }, []);

  const loadTickets = async () => {
    setLoading(true);
    try {
      const { data } = await api('/tickets');
      setTickets(data || []);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div>
        <div className="header-title">📋 Chamados</div>
        <div className="header-sub">{tickets.length} chamados registrados</div>
      </div>
      <button className="btn btn-purple" onClick={() => setOpenCreateModal(true)}>+ Novo Chamado</button>
    </div>

    <div className="table-container">
      <table className="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Tipo</th>
            <th>Criticidade</th>
            <th>Status</th>
            <th>SLA</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          {tickets.map(t => (
            <tr key={t.id}>
              <td style={{ fontSize: '11px', fontFamily: 'monospace', fontWeight: '600' }}>{t.id}</td>
              <td>{t.client_name}</td>
              <td>{t.occurrence_type}</td>
              <td><span className={`badge badge-${t.criticality}`}>{t.criticality}</span></td>
              <td>{t.status}</td>
              <td><span className={`badge ${t.sla_state === 'overdue' ? 'badge-critical' : 'badge-low'}`}>{t.sla_state}</span></td>
              <td><button className="btn btn-sm btn-outline" onClick={() => setSelectedTicket(t)}>Ver</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>

    {openCreateModal && <CreateTicketModal onClose={() => setOpenCreateModal(false)} onCreated={() => { loadTickets(); setOpenCreateModal(false); }} />}
    {selectedTicket && <TicketDetailModal ticket={selectedTicket} onClose={() => setSelectedTicket(null)} />}
  </div>;
}

function CreateTicketModal({ onClose, onCreated, toast }) {
  const [f, setF] = useState({
    business_unit_id: 'led', client_name: '', cnpj: '', channel: 'whatsapp',
    occurrence_type: 'technical_support', criticality: 'medium',
    area_responsible: 'support', notify_areas: [],
    product: '', serial_number: '', order_number: '', nf_number: '',
    order_value: '', revenue_at_risk: '', description: '', expectation: '', previous_action: '',
    am_user_id: '', bdm_user_id: '', is_vip: false, is_recurrence: false
  });
  const [users, setUsers] = useState([]);
  const [busy, setBusy] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);

  useEffect(() => {
    (async () => {
      try { const u = await api('/users/lookup?role=sales'); setUsers(u); } catch(e) { console.error(e); }
    })();
  }, []);

  const areas = [
    { v: 'support', l: 'Suporte Técnico' },
    { v: 'operations', l: 'Operações/CD' },
    { v: 'sales', l: 'Comercial' },
    { v: 'purchasing', l: 'Compras' },
    { v: 'warehouse', l: 'CD/Estoque' },
    { v: 'fiscal', l: 'Fiscal' },
    { v: 'rma', l: 'RMA' },
    { v: 'financial', l: 'Financeiro' },
  ];

  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const toggleArea = a => setF(p => ({ ...p, notify_areas: p.notify_areas.includes(a) ? p.notify_areas.filter(x => x !== a) : [...p.notify_areas, a] }));

  const runAI = async () => {
    if (!f.description || f.description.length < 10) return;
    setAiLoading(true);
    try {
      const { result } = await api('/ai/triage', 'POST', {
        client_name: f.client_name, business_unit_id: f.business_unit_id,
        product: f.product, description: f.description,
        expectation: f.expectation, previous_action: f.previous_action
      });
      setAiResult(result);
    } catch(e) { console.error(e); }
    finally { setAiLoading(false); }
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!f.client_name.trim() || !f.description.trim() || f.description.length < 10) return;
    setBusy(true);
    try {
      const p = { ...f, order_value: f.order_value ? parseFloat(f.order_value) : null, revenue_at_risk: f.revenue_at_risk ? parseFloat(f.revenue_at_risk) : 0 };
      await api('/tickets', 'POST', p);
      onCreated();
    } catch(e) { alert(e.message); }
    finally { setBusy(false); }
  };

  const inp = { width: '100%', padding: '10px 12px', border: '1px solid var(--line)', borderRadius: '8px', fontSize: '13px', color: 'var(--ink)', background: '#fff', outline: 'none', fontFamily: 'inherit' };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">📋 Abrir Chamado</div><div className="modal-sub">Registrar nova ocorrência de pós-venda</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit} style={{ padding: '24px' }}>
        {/* SEÇÃO 1 — IDENTIFICAÇÃO */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: '10px' }}>Identificação</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '12px' }}>
            <div><label className="form-label">BU *</label><select style={inp} value={f.business_unit_id} onChange={e=>set('business_unit_id',e.target.value)}><option value="led">LED / PRO AV</option><option value="av">Áudio e Vídeo</option><option value="seg">Segurança Eletrônica</option><option value="cab">Cabeamento</option></select></div>
            <div><label className="form-label">Canal *</label><select style={inp} value={f.channel} onChange={e=>set('channel',e.target.value)}><option value="whatsapp">WhatsApp</option><option value="email">E-mail</option><option value="phone">Telefone</option><option value="sales">Comercial</option><option value="portal">Portal</option></select></div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '12px' }}>
            <div><label className="form-label">Cliente *</label><input style={inp} value={f.client_name} onChange={e=>set('client_name',e.target.value)} placeholder="Nome do cliente ou empresa"/></div>
            <div><label className="form-label">CNPJ</label><input style={inp} value={f.cnpj} onChange={e=>set('cnpj',formatCPF(e.target.value))} placeholder="00.000.000/0000-00"/></div>
          </div>
          <div style={{ marginTop: '10px', display: 'flex', gap: '20px' }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: '7px', fontSize: '13px', color: 'var(--mid)', cursor: 'pointer' }}><input type="checkbox" checked={f.is_vip} onChange={e=>set('is_vip',e.target.checked)}/> ⭐ Cliente VIP</label>
            <label style={{ display: 'flex', alignItems: 'center', gap: '7px', fontSize: '13px', color: 'var(--mid)', cursor: 'pointer' }}><input type="checkbox" checked={f.is_recurrence} onChange={e=>set('is_recurrence',e.target.checked)}/> ↩ Recorrência</label>
          </div>
        </div>

        {/* SEÇÃO 2 — PRODUCT & EQUIPE */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: '10px' }}>Produto e Equipe</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', marginBottom: '12px' }}>
            <div><label className="form-label">Produto</label><input style={inp} value={f.product} onChange={e=>set('product',e.target.value)} placeholder="Módulo P3, Painel..."/></div>
            <div><label className="form-label">Nº de Série</label><input style={inp} value={f.serial_number} onChange={e=>set('serial_number',e.target.value)} placeholder="SN-XXXXXX"/></div>
            <div><label className="form-label">AM (Account Manager)</label><select style={inp} value={f.am_user_id} onChange={e=>set('am_user_id',e.target.value)}><option value="">— Nenhum —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
            <div><label className="form-label">BDM (Desenvolvimento de Negócios)</label><select style={inp} value={f.bdm_user_id} onChange={e=>set('bdm_user_id',e.target.value)}><option value="">— Nenhum —</option>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
          </div>
        </div>

        {/* SEÇÃO 3 — PEDIDO & VALORES */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: '10px' }}>Pedido e Valores</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', marginBottom: '12px' }}>
            <div><label className="form-label">Nº Pedido</label><input style={inp} value={f.order_number} onChange={e=>set('order_number',e.target.value)} placeholder="PED-00000"/></div>
            <div><label className="form-label">Nº NF</label><input style={inp} value={f.nf_number} onChange={e=>set('nf_number',e.target.value)} placeholder="NF-00000"/></div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
            <div><label className="form-label">Valor do Pedido (R$)</label><input style={inp} type="number" step="0.01" value={f.order_value} onChange={e=>set('order_value',e.target.value)} placeholder="0.00"/></div>
            <div><label className="form-label">Receita em Risco (R$)</label><input style={inp} type="number" step="0.01" value={f.revenue_at_risk} onChange={e=>set('revenue_at_risk',e.target.value)} placeholder="0.00"/></div>
          </div>
        </div>

        {/* SEÇÃO 4 — DESCRIÇÃO + IA */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
            <span style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em' }}>Descrição da Ocorrência</span>
            <button type="button" onClick={runAI} disabled={aiLoading || !f.description || f.description.length < 10} style={{ padding: '6px 14px', background: 'var(--dark2)', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '12px', fontWeight: '700', cursor: 'pointer', opacity: (!f.description || f.description.length < 10) ? 0.35 : 1 }}>
              {aiLoading ? <><span className="spinner" style={{ marginRight: '6px' }} />Analisando...</> : <>✦ Triagem por IA</>}
            </button>
          </div>
          <div><label className="form-label">Descrição completa *</label><textarea style={{...inp,minHeight:'76px',resize:'vertical',lineHeight:'1.5'}} value={f.description} onChange={e=>set('description',e.target.value)} placeholder="O que aconteceu, quando, como o cliente reportou..."/></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginTop: '10px' }}>
            <div><label className="form-label">Expectativa do Cliente</label><textarea style={{...inp,minHeight:'52px',resize:'vertical',lineHeight:'1.5'}} value={f.expectation} onChange={e=>set('expectation',e.target.value)} placeholder="O que o cliente espera como resolução?"/></div>
            <div><label className="form-label">Ação Já Tentada</label><textarea style={{...inp,minHeight:'52px',resize:'vertical',lineHeight:'1.5'}} value={f.previous_action} onChange={e=>set('previous_action',e.target.value)} placeholder="O que já foi feito para resolver?"/></div>
          </div>
          {aiResult && (
            <div style={{ marginTop: '12px', padding: '14px', background: 'rgba(109,64,230,.07)', border: '1px solid var(--pb)', borderRadius: '9px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                <span style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em' }}>✦ Análise da IA</span>
                <button type="button" onClick={() => { setF(p=>({...p,occurrence_type:aiResult.occurrence_type||p.occurrence_type,criticality:aiResult.criticality||p.criticality,notify_areas:Array.isArray(aiResult.notify_areas)?aiResult.notify_areas:p.notify_areas})); setAiResult(null); }} style={{ padding: '5px 12px', background: 'var(--p)', border: 'none', borderRadius: '6px', color: '#fff', fontSize: '11px', fontWeight: '700', cursor: 'pointer' }}>Aplicar ao Formulário →</button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '10px' }}>
                <div><span style={{ fontSize: '10px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase' }}>Tipo sugerido</span><p style={{ fontSize: '12px', color: 'var(--dark)', marginTop: '2px', lineHeight: '1.5' }}>{aiResult.occurrence_type}</p></div>
                <div><span style={{ fontSize: '10px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase' }}>Criticidade</span><p style={{ fontSize: '12px', color: 'var(--dark)', marginTop: '2px', lineHeight: '1.5' }}>{aiResult.criticality}</p></div>
                <div><span style={{ fontSize: '10px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase' }}>Causa Raiz Hipótese</span><p style={{ fontSize: '12px', color: 'var(--dark)', marginTop: '2px', lineHeight: '1.5' }}>{aiResult.root_cause_hypothesis}</p></div>
                <div><span style={{ fontSize: '10px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase' }}>Próximos Passos</span><p style={{ fontSize: '12px', color: 'var(--dark)', marginTop: '2px', lineHeight: '1.5' }}>{aiResult.next_steps}</p></div>
              </div>
              {aiResult.client_communication && (
                <div style={{ background: '#fff', borderRadius: '7px', padding: '10px', borderLeft: '3px solid var(--p)' }}>
                  <span style={{ fontSize: '10px', fontWeight: '700', color: 'var(--muted)', textTransform: 'uppercase', display: 'block', marginBottom: '4px' }}>💬 Rascunho — Primeira resposta ao cliente</span>
                  <p style={{ fontSize: '12px', color: 'var(--mid)', lineHeight: '1.6', whiteSpace: 'pre-wrap', fontStyle: 'italic' }}>{aiResult.client_communication}</p>
                </div>
              )}
            </div>
          )}
        </div>

        {/* SEÇÃO 5 — CLASSIFICAÇÃO */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: '10px' }}>Classificação</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
            <div><label className="form-label">Tipo de Ocorrência *</label><select style={inp} value={f.occurrence_type} onChange={e=>set('occurrence_type',e.target.value)}><option value="technical_support">Suporte Técnico</option><option value="complaint">Reclamação de Cliente</option><option value="rma">RMA / Defeito de Produto</option><option value="operational_problem">Problema Operacional</option><option value="delivery_problem">Atraso de Entrega</option><option value="incomplete_order">Pedido Incompleto / Incorreto</option><option value="warranty">Solicitação de Garantia</option><option value="exchange_return">Troca / Devolução</option><option value="billing_issue">Problema Fiscal</option><option value="other">Outro</option></select></div>
            <div><label className="form-label">Criticidade *</label><select style={inp} value={f.criticality} onChange={e=>set('criticality',e.target.value)}><option value="critical">🔴 Crítica — SLA 8h</option><option value="high">🟠 Alta — SLA 24h</option><option value="medium">🟡 Média — SLA 48h</option><option value="low">🟢 Baixa — SLA 96h</option></select></div>
          </div>
          <div style={{ marginTop: '12px' }}><label className="form-label">Área Responsável *</label><select style={inp} value={f.area_responsible} onChange={e=>set('area_responsible',e.target.value)}>{areas.map(a=><option key={a.v} value={a.v}>{a.l}</option>)}</select></div>
        </div>

        {/* SEÇÃO 6 — EQUIPES A NOTIFICAR */}
        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px' }}>
          <div style={{ fontSize: '11px', fontWeight: '700', color: 'var(--pd)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: '10px' }}>Equipes a Notificar</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
            {areas.map(a=><label key={a.v} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '7px 13px', borderRadius: '8px', border: `1.5px solid ${f.notify_areas.includes(a.v)?'var(--p)':'var(--line)'}`, background: f.notify_areas.includes(a.v)?'var(--pbg)':'#fff', cursor: 'pointer', fontSize: '12px', fontWeight: f.notify_areas.includes(a.v)?700:400, color: f.notify_areas.includes(a.v)?'var(--pd)':'var(--mid)', transition: '.12s', userSelect: 'none' }}>
              <input type="checkbox" style={{ display: 'none' }} checked={f.notify_areas.includes(a.v)} onChange={()=>{}}/>
              <span onClick={() => { const na = f.notify_areas.includes(a.v) ? f.notify_areas.filter(x=>x!==a.v) : [...f.notify_areas, a.v]; set('notify_areas', na); }} style={{ cursor: 'pointer', width: '100%' }}>{f.notify_areas.includes(a.v)?'✓ ':''}{a.l}</span>
            </label>)}
          </div>
          <p style={{ fontSize: '10px', color: 'var(--muted)', marginTop: '8px' }}>As equipes selecionadas serão notificadas sobre este chamado.</p>
        </div>

        <div style={{ display: 'flex', gap: '12px', justifyContent: 'flex-end', marginTop: '24px', paddingTop: '16px', borderTop: '1px solid var(--line)' }}>
          <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Abrir Chamado</button>
        </div>
      </form>
    </div>
  </div>;
}

function TicketDetailModal({ ticket, onClose }) {

    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">{ticket.id}</div><div className="modal-sub">{ticket.client_name}</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div style={{ padding: '24px' }}>
        <div className="grid-2">
          <div><span className="form-label">Status</span><p style={{ fontSize: '14px', fontWeight: '600', marginTop: '4px' }}>{ticket.status}</p></div>
          <div><span className="form-label">Criticidade</span><p style={{ fontSize: '14px', fontWeight: '600', marginTop: '4px' }}><span className={`badge badge-${ticket.criticality}`}>{ticket.criticality}</span></p></div>
          <div><span className="form-label">Tipo</span><p style={{ fontSize: '14px', fontWeight: '600', marginTop: '4px' }}>{ticket.occurrence_type}</p></div>
          <div><span className="form-label">Área Responsável</span><p style={{ fontSize: '14px', fontWeight: '600', marginTop: '4px' }}>{ticket.area_responsible}</p></div>
        </div>
        <div style={{ marginTop: '16px' }}>
          <span className="form-label">Descrição</span>
          <p style={{ fontSize: '13px', color: 'var(--mid)', marginTop: '6px', lineHeight: '1.6', whiteSpace: 'pre-wrap' }}>{ticket.description}</p>
        </div>
        {ticket.revenue_at_risk > 0 && (
          <div style={{ marginTop: '16px', padding: '12px', background: 'rgba(220,38,38,.1)', borderRadius: '8px', borderLeft: '3px solid var(--red)' }}>
            <span className="form-label" style={{ color: 'var(--red)' }}>Receita em Risco</span>
            <p style={{ fontSize: '16px', fontWeight: '700', color: 'var(--red)', marginTop: '4px' }}>{formatMoney(ticket.revenue_at_risk)}</p>

    </div>
  </div>;
}

// RECLAMAÇÕES (COMPLAINTS)
// ══════════════════════════════════════════════════════════════

const COMPLAINT_TYPES = [
  { v: 'delayed_delivery', l: 'Atraso na entrega' },
  { v: 'poor_service', l: 'Atendimento insatisfatório' },
  { v: 'product_quality', l: 'Qualidade do produto' },
  { v: 'wrong_spec', l: 'Especificação incorreta' },
  { v: 'billing_error', l: 'Erro de cobrança' },
  { v: 'missing_support', l: 'Suporte técnico ausente' },
  { v: 'broken_promise', l: 'Promessa não cumprida' },
  { v: 'communication_failure', l: 'Falha de comunicação' },
  { v: 'product_not_as_expected', l: 'Produto diferente do esperado' },
  { v: 'installation_problem', l: 'Problema na instalação' },
  { v: 'commercial_complaint', l: 'Reclamação comercial geral' },
  { v: 'other', l: 'Outro' },
];
const AREAS = [
  { v: 'support', l: 'Suporte Técnico' }, { v: 'operations', l: 'Operações/CD' },
  { v: 'sales', l: 'Comercial' }, { v: 'purchasing', l: 'Compras' },
  { v: 'warehouse', l: 'CD/Estoque' }, { v: 'fiscal', l: 'Fiscal' },
  { v: 'rma', l: 'RMA' }, { v: 'financial', l: 'Financeiro' },
  { v: 'cso', l: 'CSO' }, { v: 'admin', l: 'Admin' }, { v: 'board', l: 'Board' },
];
const COMPLAINT_STAGE = { open: 'Ouvida', in_progress: 'Tratada', awaiting_client: 'Aguard. cliente', resolved: 'Resolvida', closed: 'Sanada', cancelled: 'Cancelada' };
const COMPLAINT_FLOW = { open: ['in_progress'], in_progress: ['awaiting_client', 'resolved'], awaiting_client: ['in_progress', 'resolved'], resolved: ['closed'], closed: [], cancelled: [] };

function ComplaintsView({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/complaints${filter ? `?status=${filter}` : ''}`); setItems(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div>
        <div className="header-title">⚠️ Reclamações</div>
        <div className="header-sub">{items.length} reclamações {filter ? `(${COMPLAINT_STAGE[filter]})` : 'no total'}</div>
      </div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Nova Reclamação</button>
    </div>

    <div className="tabbar">
      {['', 'open', 'in_progress', 'awaiting_client', 'resolved', 'closed'].map(s => (
        <div key={s} className={`tabbar-item ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{s ? COMPLAINT_STAGE[s] : 'Todas'}</div>
      ))}
    </div>

    <div className="table-container">
      <table className="table">
        <thead><tr><th>#</th><th>Cliente</th><th>Tipo</th><th>Severidade</th><th>Estágio</th><th>Área Resp.</th><th>Risco (R$)</th><th>Ações</th></tr></thead>
        <tbody>
          {loading ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px' }}><span className="spinner" /></td></tr> :
            !items.length ? <tr><td colSpan="8" style={{ textAlign: 'center', padding: '20px', color: 'var(--muted)' }}>Nenhuma reclamação encontrada.</td></tr> :
            items.map(c => (
              <tr key={c.id}>
                <td style={{ fontFamily: 'monospace', fontWeight: 600 }}>#{c.id}</td>
                <td>{c.client_name}</td>
                <td>{COMPLAINT_TYPES.find(t => t.v === c.type_key)?.l || c.type_key}</td>
                <td><Pill tone={c.severity}>{c.severity}</Pill></td>
                <td><Pill>{COMPLAINT_STAGE[c.status] || c.status}</Pill></td>
                <td>{c.responsible_area}</td>
                <td>{c.loss_risk > 0 ? formatMoney(c.loss_risk) : '—'}</td>
                <td><button className="btn btn-sm btn-outline" onClick={() => setSelected(c)}>Ver</button></td>
              </tr>
            ))}
        </tbody>
      </table>
    </div>

    {openCreate && <CreateComplaintModal onClose={() => setOpenCreate(false)} onCreated={() => { load(); setOpenCreate(false); toast?.('Reclamação registrada.'); }} toast={toast} />}
    {selected && <ComplaintDetailModal id={selected.id} onClose={() => setSelected(null)} onChanged={load} toast={toast} />}
  </div>;
}

function CreateComplaintModal({ onClose, onCreated, toast }) {
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({
    client_id: '', business_unit_id: 'led', type_key: 'other', severity: 'medium',
    channel: 'whatsapp', reason: '', client_feeling: 'neutral', procedence: 'under_analysis',
    causing_area: '', responsible_area: 'cso', responsible_user_id: '', loss_risk: '', commercial_impact: ''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { const u = await api('/users/lookup'); setUsers(u || []); } catch(e) {}
  })(); }, []);

  const submit = async (e) => {
    e.preventDefault();

function ComplaintDetailModal({ id, onClose, onChanged, toast }) {
  const [c, setC] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [edit, setEdit] = useState({ causing_area: '', recovery_action: '', resolution: '' });

  const load = async () => {
    try { const data = await api(`/complaints/${id}`); setC(data); setEdit({ causing_area: data.causing_area || '', recovery_action: data.recovery_action || '', resolution: data.resolution || '' }); }
    catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);

  const saveIdentification = async () => {
    setBusy(true);
    try {
      await api(`/complaints/${id}`, 'PATCH', { causing_area: edit.causing_area || null, recovery_action: edit.recovery_action, resolution: edit.resolution });
      toast?.('Tratativa atualizada.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const changeStatus = async (status) => {
    setBusy(true);
    try {
      await api(`/complaints/${id}/status`, 'PATCH', { status });
      toast?.(`Status alterado para ${COMPLAINT_STAGE[status]}.`); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/complaints/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!c) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const nextStages = COMPLAINT_FLOW[c.status] || [];

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '720px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">Reclamação #{c.id} — {c.client_name}</div>
          <div className="modal-sub"><Pill tone={c.severity}>{c.severity}</Pill> &nbsp; <Pill>{COMPLAINT_STAGE[c.status]}</Pill></div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <p style={{ fontSize: '13px', color: 'var(--mid)', lineHeight: 1.6, whiteSpace: 'pre-wrap', background: 'var(--bg)', padding: '12px', borderRadius: '8px' }}>{c.reason}</p>

        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', margin: '14px 0' }}>
          {nextStages.map(s => <button key={s} className="btn btn-sm btn-purple" disabled={busy} onClick={() => changeStatus(s)}>→ {COMPLAINT_STAGE[s]}</button>)}
          {c.status !== 'cancelled' && c.status !== 'closed' && <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => changeStatus('cancelled')}>Cancelar reclamação</button>}
        </div>

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Identificação & Recuperação</div>
          <div className="form-row" style={{ marginBottom: '12px' }}>
            <div><label className="form-label">Área Causadora</label>
              <select className="form-input" value={edit.causing_area} onChange={e => setEdit(p => ({ ...p, causing_area: e.target.value }))}>
                <option value="">Não identificada</option>{AREAS.map(a => <option key={a.v} value={a.v}>{a.l}</option>)}
              </select>
            </div>
            <div><label className="form-label">Risco de Perda</label><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '8px' }}>{c.loss_risk > 0 ? formatMoney(c.loss_risk) : '—'}</p></div>
          </div>
          <div className="form-group"><label className="form-label">Ação de Recuperação</label>
            <textarea className="form-input" value={edit.recovery_action} onChange={e => setEdit(p => ({ ...p, recovery_action: e.target.value }))} placeholder="O que está sendo feito para reverter a insatisfação?" /></div>
          <div className="form-group"><label className="form-label">Resolução (necessária antes de marcar como resolvida)</label>
            <textarea className="form-input" value={edit.resolution} onChange={e => setEdit(p => ({ ...p, resolution: e.target.value }))} placeholder="Como foi resolvido?" /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveIdentification}>Salvar tratativa</button>
        </div>

        <div className="form-group">
          <label className="form-label">Adicionar nota interna</label>
          <div style={{ display: 'flex', gap: '8px' }}>
            <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota visível apenas internamente..." />
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
          </div>
        </div>

        <div style={{ marginTop: '16px' }}>
          <span className="form-label">Histórico</span>
          <Timeline items={c.history} />
        </div>
      </div>
    </div>
  </div>;
}

function ReturnDetailModal({ id, onClose, onChanged, toast }) {
  const [r, setR] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [tab, setTab] = useState('flow');
  const [cost, setCost] = useState({ root_cause: '', root_cause_notes: '', reduction_action: '', reduction_feasible: false, tax_cost: '', freight_cost: '', refaturamento_cost: '', difal_cost: '', cost_status: '', decision_notes: '' });
  const [decision, setDecision] = useState('');
  const [rejectReason, setRejectReason] = useState('');

  const load = async () => {
    try {
      const data = await api(`/returns/${id}`); setR(data);
      setCost({
        root_cause: data.root_cause || '', root_cause_notes: data.root_cause_notes || '',
        reduction_action: data.reduction_action || '', reduction_feasible: !!data.reduction_feasible,
        tax_cost: data.tax_cost ?? '', freight_cost: data.freight_cost ?? '',
        refaturamento_cost: data.refaturamento_cost ?? '', difal_cost: data.difal_cost ?? '',
        cost_status: data.cost_status || '', decision_notes: data.decision_notes || '',
      });
    } catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);

  const saveCost = async () => {
    setBusy(true);
    try {
      await api(`/returns/${id}`, 'PATCH', {
        ...cost,
        tax_cost: cost.tax_cost === '' ? null : parseFloat(cost.tax_cost),
        freight_cost: cost.freight_cost === '' ? null : parseFloat(cost.freight_cost),
        refaturamento_cost: cost.refaturamento_cost === '' ? null : parseFloat(cost.refaturamento_cost),
        difal_cost: cost.difal_cost === '' ? null : parseFloat(cost.difal_cost),
      });
      toast?.('Análise de custo salva.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const advance = async () => {
    const idx = RETURN_FLOW_ORDER.indexOf(r.status);
    const next = RETURN_FLOW_ORDER[idx + 1];
    if (!next) return;
    if (next === 'approved' && !decision) { toast?.('Selecione a decisão (crédito/troca/etc.) antes de aprovar.', 'error'); return; }
    setBusy(true);
    try {
      await api(`/returns/${id}/status`, 'PATCH', { status: next, decision: decision || undefined });
      toast?.(`Status: ${RETURN_LABEL[next]}.`); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const reject = async () => {
    if (!rejectReason.trim()) { toast?.('Informe o motivo da rejeição.', 'error'); return; }
    setBusy(true);
    try { await api(`/returns/${id}/status`, 'PATCH', { status: 'rejected', reject_reason: rejectReason }); toast?.('Devolução rejeitada.'); load(); onChanged?.(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/returns/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!r) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const nextLabel = RETURN_FLOW_ORDER[RETURN_FLOW_ORDER.indexOf(r.status) + 1];
  const totalCost = (parseFloat(r.tax_cost)||0) + (parseFloat(r.freight_cost)||0) + (parseFloat(r.refaturamento_cost)||0) + (parseFloat(r.difal_cost)||0) + (parseFloat(r.warehouse_overhead_cost)||0);

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '760px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">Devolução #{r.id} — {r.client_name}</div><div className="modal-sub"><Pill>{RETURN_LABEL[r.status] || r.status}</Pill></div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <div className="tabbar">
          <div className={`tabbar-item ${tab === 'flow' ? 'active' : ''}`} onClick={() => setTab('flow')}>Fluxo de Status</div>
          <div className={`tabbar-item ${tab === 'cost' ? 'active' : ''}`} onClick={() => setTab('cost')}>Análise de Custo</div>
          <div className={`tabbar-item ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>Histórico</div>
        </div>

        {tab === 'flow' && <>
          <p style={{ fontSize: '13px', color: 'var(--mid)', background: 'var(--bg)', padding: '12px', borderRadius: '8px', marginBottom: '12px' }}>{r.reason}</p>
          <div className="grid-2" style={{ marginBottom: '14px' }}>
            <div><span className="form-label">Produto</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.product_name_snap || '—'} (qtd {r.quantity})</p></div>
            <div><span className="form-label">NF</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.nf_number || '—'} {r.nf_attached ? '✓ anexada' : '⚠ não anexada'}</p></div>
          </div>
          {r.status !== 'closed' && r.status !== 'rejected' && <>
            {nextLabel === 'approved' && (
              <div className="form-group">
                <label className="form-label">Decisão (obrigatória para aprovar)</label>
                <select className="form-input" value={decision} onChange={e => setDecision(e.target.value)}>
                  <option value="">Selecione...</option>{RETURN_DECISIONS.map(d => <option key={d.v} value={d.v}>{d.l}</option>)}
                </select>
              </div>
            )}
            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', margin: '10px 0' }}>
              {nextLabel && <button className="btn btn-sm btn-purple" disabled={busy} onClick={advance}>→ {RETURN_LABEL[nextLabel]}</button>}
            </div>
            <div style={{ borderTop: '1px solid var(--line)', paddingTop: '12px', marginTop: '8px' }}>
              <label className="form-label">Rejeitar devolução</label>
              <div style={{ display: 'flex', gap: '8px' }}>
                <input className="form-input" value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="Motivo da rejeição..." />
                <button className="btn btn-sm btn-outline" disabled={busy} onClick={reject}>Rejeitar</button>
              </div>
            </div>
          </>}
          {r.decision && <p style={{ marginTop: '12px', fontSize: '12px', color: 'var(--mid)' }}>Decisão registrada: <strong>{RETURN_DECISIONS.find(d=>d.v===r.decision)?.l || r.decision}</strong></p>}
          {r.reject_reason && <p style={{ marginTop: '8px', fontSize: '12px', color: 'var(--red)' }}>Motivo da rejeição: {r.reject_reason}</p>}
        </>}

        {tab === 'cost' && <div className="cost-box">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Imposto (R$)</label><input className="form-input" type="number" step="0.01" value={cost.tax_cost} onChange={e => setCost(p=>({...p,tax_cost:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">Frete (R$)</label><input className="form-input" type="number" step="0.01" value={cost.freight_cost} onChange={e => setCost(p=>({...p,freight_cost:e.target.value}))} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Refaturamento (R$)</label><input className="form-input" type="number" step="0.01" value={cost.refaturamento_cost} onChange={e => setCost(p=>({...p,refaturamento_cost:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">DIFAL (R$)</label><input className="form-input" type="number" step="0.01" value={cost.difal_cost} onChange={e => setCost(p=>({...p,difal_cost:e.target.value}))} /></div>
          </div>
          <div className="cost-row"><span>Overhead de galpão (1,5% — calculado automaticamente)</span><span>{formatMoney(r.warehouse_overhead_cost || 0)}</span></div>
          <div className="cost-row total"><span>Custo Total Gerado pela Devolução</span><span style={{ color: 'var(--red)' }}>{formatMoney(totalCost)}</span></div>

          <div className="form-row" style={{ marginTop: '12px' }}>
            <div className="form-group"><label className="form-label">Causa Raiz</label>
              <select className="form-input" value={cost.root_cause} onChange={e => setCost(p=>({...p,root_cause:e.target.value}))}>
                <option value="">Não identificada</option><option value="logistics">Logística</option><option value="commercial">Comercial</option>
                <option value="product">Produto</option><option value="client_error">Erro do cliente</option><option value="other">Outra</option>
              </select></div>
            <label className="checkbox-item" style={{ alignSelf: 'flex-end', marginBottom: '16px', width: 'fit-content' }}>
              <input type="checkbox" checked={cost.reduction_feasible} onChange={e=>setCost(p=>({...p,reduction_feasible:e.target.checked}))} id="redfeas" />
              <label htmlFor="redfeas" onClick={()=>setCost(p=>({...p,reduction_feasible:!p.reduction_feasible}))} style={{cursor:'pointer'}}>{cost.reduction_feasible?'✓ Redução viável':'Redução de custo viável?'}</label>
            </label>
          </div>
          <div className="form-group"><label className="form-label">Notas da Causa Raiz</label><textarea className="form-input" value={cost.root_cause_notes} onChange={e => setCost(p=>({...p,root_cause_notes:e.target.value}))} /></div>
          <div className="form-group"><label className="form-label">Ação para Redução de Custo</label><textarea className="form-input" value={cost.reduction_action} onChange={e => setCost(p=>({...p,reduction_action:e.target.value}))} /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveCost}>Salvar Análise de Custo</button>
        </div>}

        {tab === 'history' && <>
          <Timeline items={r.history} />
          <div className="form-group" style={{ marginTop: '14px' }}>
            <label className="form-label">Adicionar nota interna</label>
            <div style={{ display: 'flex', gap: '8px' }}>
              <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota interna..." />
              <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
            </div>
          </div>
        </>}
      </div>
    </div>
  </div>;
}

// ══════════════════════════════════════════════════════════════
// RMA
// ══════════════════════════════════════════════════════════════

const RMA_FLOW_ORDER = ['requested','under_analysis','awaiting_shipment','in_transit','received','technical_analysis','awaiting_decision','approved','repair','replacement','closed'];
const RMA_LABEL = {
  requested: 'Solicitado', under_analysis: 'Em análise', awaiting_shipment: 'Aguard. envio',
  in_transit: 'Em trânsito', received: 'Recebido', technical_analysis: 'Análise técnica',
  awaiting_decision: 'Aguard. decisão', approved: 'Aprovado', repair: 'Reparo',
  replacement: 'Substituição', rejected: 'Rejeitado', closed: 'Encerrado',
};
const RMA_OUTCOMES = [
  { v: 'loss', l: 'Perda' }, { v: 'replacement', l: 'Troca' },
  { v: 'supplier_rebate', l: 'Rebate da Indústria' }, { v: 'customer_return', l: 'Devolução ao Cliente' },
];

function RMAView({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');
  const [openCreate, setOpenCreate] = useState(false);
  const [selected, setSelected] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const { data } = await api(`/rma${filter ? `?status=${filter}` : ''}`); setItems(data || []); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setLoading(false); }
  };
  useEffect(() => { load(); }, [filter]);

  return <div className="section-grid">
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div><div className="header-title">🔧 RMA</div><div className="header-sub">{items.length} RMAs listados</div></div>
      <button className="btn btn-purple" onClick={() => setOpenCreate(true)}>+ Novo RMA</button>
    </div>

    <div className="tabbar" style={{ flexWrap: 'wrap' }}>
      <div className={`tabbar-item ${filter === '' ? 'active' : ''}`} onClick={() => setFilter('')}>Todos</div>
      {RMA_FLOW_ORDER.map(s => <div key={s} className={`tabbar-item ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{RMA_LABEL[s]}</div>)}
      <div className={`tabbar-item ${filter === 'rejected' ? 'active' : ''}`} onClick={() => setFilter('rejected')}>Rejeitados</div>
    </div>

    <div className="table-container">
      <table className="table">
        <thead><tr><th>#</th><th>Cliente</th><th>Produto</th><th>Defeito</th><th>Status</th><th>Recorrência</th><th>Ações</th></tr></thead>
        <tbody>
          {loading ? <tr><td colSpan="7" style={{ textAlign: 'center', padding: '20px' }}><span className="spinner" /></td></tr> :
            !items.length ? <tr><td colSpan="7" style={{ textAlign: 'center', padding: '20px', color: 'var(--muted)' }}>Nenhum RMA encontrado.</td></tr> :
            items.map(r => (
              <tr key={r.id}>
                <td style={{ fontFamily: 'monospace', fontWeight: 600 }}>#{r.id}</td>
                <td>{r.client_name || '—'}</td>
                <td>{r.product_name}{r.product_code ? ` (${r.product_code})` : ''}</td>
                <td style={{ maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.defect_description}</td>
                <td><Pill>{RMA_LABEL[r.status] || r.status}</Pill></td>
                <td>{r.is_recurrence ? <span className="badge badge-recurrence">↻ {r.recurrence_count}x</span> : '—'}</td>
                <td><button className="btn btn-sm btn-outline" onClick={() => setSelected(r)}>Ver</button></td>
              </tr>
            ))}
        </tbody>
      </table>
    </div>

    {openCreate && <CreateRMAModal onClose={() => setOpenCreate(false)} onCreated={(res) => { load(); setOpenCreate(false); toast?.(res?.is_recurrence ? `RMA registrado — ⚠ ${res.recurrence_count}ª recorrência deste produto.` : 'RMA registrado.'); }} toast={toast} />}
    {selected && <RMADetailModal id={selected.id} onClose={() => setSelected(null)} onChanged={load} toast={toast} />}
  </div>;
}

function CreateRMAModal({ onClose, onCreated, toast }) {
  const [clients, setClients] = useState([]);
  const [users, setUsers] = useState([]);
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({
    client_id: '', business_unit_id: 'led', ticket_id: '', product_name: '', product_code: '',
    serial_number: '', defect_description: '', warranty: false, unit_cost: '', responsible_user_id: ''
  });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => { (async () => {
    try { const { data } = await api('/clients'); setClients(data || []); } catch(e) {}
    try { const u = await api('/users/lookup'); setUsers(u || []); } catch(e) {}
  })(); }, []);

  const submit = async (e) => {
    e.preventDefault();
    if (!f.product_name.trim() || !f.defect_description.trim()) { toast?.('Produto e descrição do defeito são obrigatórios.', 'error'); return; }
    setBusy(true);
    try {
      const res = await api('/rma', 'POST', {
        ...f, client_id: f.client_id ? parseInt(f.client_id) : null,
        ticket_id: f.ticket_id || null,
        unit_cost: f.unit_cost ? parseFloat(f.unit_cost) : null,
        responsible_user_id: f.responsible_user_id ? parseInt(f.responsible_user_id) : null,
      });
      onCreated(res);
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content">
      <div className="modal-hdr">
        <div><div className="modal-title">🔧 Novo RMA</div><div className="modal-sub">Registro de produto com defeito / autorização de retorno</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <form onSubmit={submit}>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Cliente</label>
              <select className="form-input" value={f.client_id} onChange={e => set('client_id', e.target.value)}>
                <option value="">Não vinculado / interno</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select></div>
            <div className="form-group"><label className="form-label">Unidade de Negócio</label>
              <select className="form-input" value={f.business_unit_id} onChange={e => set('business_unit_id', e.target.value)}>
                <option value="led">LED</option><option value="ooh">OOH/DOOH</option><option value="rm">Retail Media</option>
              </select></div>
          </div>
          <div className="form-row-3">
            <div className="form-group"><label className="form-label">Produto *</label><input className="form-input" value={f.product_name} onChange={e => set('product_name', e.target.value)} placeholder="Nome / modelo" /></div>
            <div className="form-group"><label className="form-label">Código do Produto</label><input className="form-input" value={f.product_code} onChange={e => set('product_code', e.target.value)} placeholder="SKU" /></div>
            <div className="form-group"><label className="form-label">Nº de Série</label><input className="form-input" value={f.serial_number} onChange={e => set('serial_number', e.target.value)} placeholder="S/N" /></div>
          </div>
          <div className="form-group"><label className="form-label">Descrição do Defeito *</label>
            <textarea className="form-input" value={f.defect_description} onChange={e => set('defect_description', e.target.value)} placeholder="Descreva o defeito apresentado..." /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Ticket Vinculado</label><input className="form-input" value={f.ticket_id} onChange={e => set('ticket_id', e.target.value)} placeholder="CSO-00000000-0000 (opcional)" /></div>
            <div className="form-group"><label className="form-label">Custo Unitário (R$)</label><input className="form-input" type="number" step="0.01" value={f.unit_cost} onChange={e => set('unit_cost', e.target.value)} placeholder="0.00" /></div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <label className="checkbox-item" style={{ width: 'fit-content' }}>
              <input type="checkbox" checked={f.warranty} onChange={e => set('warranty', e.target.checked)} id="warr" />
              <label htmlFor="warr" onClick={() => set('warranty', !f.warranty)} style={{ cursor: 'pointer' }}>{f.warranty ? '✓ Dentro da garantia' : 'Dentro da garantia?'}</label>
            </label>
          </div>
          <div className="form-group" style={{ marginTop: '12px' }}><label className="form-label">Responsável pela Tratativa</label>
            <select className="form-input" value={f.responsible_user_id} onChange={e => set('responsible_user_id', e.target.value)}>
              <option value="">Eu mesmo</option>{users.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select></div>
        </div>
        <div className="modal-footer">
          <button type="button" className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-purple" disabled={busy}>{busy && <span className="spinner" style={{ marginRight: '6px' }} />}✓ Registrar RMA</button>
        </div>
      </form>
    </div>
  </div>;
}

function RMADetailModal({ id, onClose, onChanged, toast }) {
  const [r, setR] = useState(null);
  const [busy, setBusy] = useState(false);
  const [note, setNote] = useState('');
  const [decision, setDecision] = useState('');
  const [outcome, setOutcome] = useState({ outcome_type: '', technical_notes: '', decision_notes: '', rebate_applicable: false, rebate_value: '', rebate_status: '' });

  const load = async () => {
    try {
      const data = await api(`/rma/${id}`); setR(data);
      setOutcome({
        outcome_type: data.outcome_type || '', technical_notes: data.technical_notes || '',
        decision_notes: data.decision_notes || '', rebate_applicable: !!data.rebate_applicable,
        rebate_value: data.rebate_value ?? '', rebate_status: data.rebate_status || '',
      });
    } catch(e) { toast?.(e.message, 'error'); }
  };
  useEffect(() => { load(); }, [id]);

  const advance = async (status) => {
    setBusy(true);
    try { await api(`/rma/${id}/status`, 'PATCH', { status, decision: decision || undefined }); toast?.(`Status: ${RMA_LABEL[status]}.`); load(); onChanged?.(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const saveOutcome = async () => {
    setBusy(true);
    try {
      await api(`/rma/${id}`, 'PATCH', { ...outcome, rebate_value: outcome.rebate_value === '' ? null : parseFloat(outcome.rebate_value) });
      toast?.('Desfecho registrado.'); load(); onChanged?.();
    } catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  const addNote = async () => {
    if (!note.trim()) return;
    setBusy(true);
    try { await api(`/rma/${id}/notes`, 'POST', { note }); setNote(''); load(); }
    catch(e) { toast?.(e.message, 'error'); }
    finally { setBusy(false); }
  };

  if (!r) return <div className="modal"><div className="modal-content" style={{ padding: '40px', textAlign: 'center' }}><span className="spinner" /></div></div>;
  const idx = RMA_FLOW_ORDER.indexOf(r.status);
  const nextStatus = idx >= 0 ? RMA_FLOW_ORDER[idx + 1] : null;

  return <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className="modal-content" style={{ maxWidth: '740px' }}>
      <div className="modal-hdr">
        <div><div className="modal-title">RMA #{r.id} — {r.product_name}</div>
          <div className="modal-sub"><Pill>{RMA_LABEL[r.status] || r.status}</Pill> {r.warranty && <span style={{ marginLeft: '8px' }}>🛡️ Em garantia</span>}</div></div>
        <button className="close-btn" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <p style={{ fontSize: '13px', color: 'var(--mid)', background: 'var(--bg)', padding: '12px', borderRadius: '8px', marginBottom: '12px' }}>{r.defect_description}</p>

        <div className="grid-2" style={{ marginBottom: '14px' }}>
          <div><span className="form-label">Cliente</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.client_name || '—'}</p></div>
          <div><span className="form-label">Nº Série / Código</span><p style={{ fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{r.serial_number || '—'} / {r.product_code || '—'}</p></div>
        </div>

        {r.related_recurrences && r.related_recurrences.length > 0 && (
          <div style={{ marginBottom: '14px', padding: '12px', background: 'rgba(220,38,38,.08)', borderRadius: '8px', borderLeft: '3px solid var(--red)' }}>
            <span className="form-label" style={{ color: 'var(--red)' }}>⚠ Recorrência — {r.related_recurrences.length} ocorrência(s) anterior(es) deste produto</span>
            <ul style={{ marginTop: '6px', paddingLeft: '18px', fontSize: '12px', color: 'var(--mid)' }}>
              {r.related_recurrences.slice(0,5).map(rec => <li key={rec.id}>RMA #{rec.id} — {RMA_LABEL[rec.status]||rec.status} — {formatDate(rec.created_at)}</li>)}
            </ul>
          </div>
        )}

        {r.status !== 'closed' && r.status !== 'rejected' && (
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '14px' }}>
            {nextStatus === 'approved' && (
              <select className="form-input" style={{ maxWidth: '220px' }} value={decision} onChange={e => setDecision(e.target.value)}>
                <option value="">Decisão (repair/replacement/credit/rejection)</option>
                <option value="repair">Reparo</option><option value="replacement">Substituição</option>
                <option value="credit">Crédito</option><option value="rejection">Rejeição</option>
              </select>
            )}
            {nextStatus && <button className="btn btn-sm btn-purple" disabled={busy} onClick={() => advance(nextStatus)}>→ {RMA_LABEL[nextStatus]}</button>}
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={() => advance('rejected')}>Rejeitar</button>
          </div>
        )}

        <div style={{ background: 'var(--bg)', borderRadius: '9px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--pd)', textTransform: 'uppercase', marginBottom: '10px' }}>Desfecho (Outcome)</div>
          <div className="form-group"><label className="form-label">Tipo de Desfecho</label>
            <select className="form-input" value={outcome.outcome_type} onChange={e => setOutcome(p => ({ ...p, outcome_type: e.target.value }))}>
              <option value="">Não definido</option>{RMA_OUTCOMES.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select></div>
          <div className="form-row">
            <label className="checkbox-item" style={{ alignSelf: 'flex-end', marginBottom: '16px', width: 'fit-content' }}>
              <input type="checkbox" checked={outcome.rebate_applicable} onChange={e => setOutcome(p => ({ ...p, rebate_applicable: e.target.checked }))} id="rebapp" />
              <label htmlFor="rebapp" onClick={() => setOutcome(p => ({ ...p, rebate_applicable: !p.rebate_applicable }))} style={{ cursor: 'pointer' }}>{outcome.rebate_applicable ? '✓ Rebate aplicável' : 'Rebate da indústria aplicável?'}</label>
            </label>
            {outcome.rebate_applicable && <div className="form-group"><label className="form-label">Valor do Rebate (R$)</label><input className="form-input" type="number" step="0.01" value={outcome.rebate_value} onChange={e => setOutcome(p => ({ ...p, rebate_value: e.target.value }))} /></div>}
          </div>
          {outcome.rebate_applicable && <div className="form-group"><label className="form-label">Status do Rebate</label>
            <select className="form-input" value={outcome.rebate_status} onChange={e => setOutcome(p => ({ ...p, rebate_status: e.target.value }))}>
              <option value="">—</option><option value="pending">Pendente</option><option value="requested">Solicitado</option>
              <option value="applied">Aplicado</option><option value="rejected">Rejeitado</option>
            </select></div>}
          <div className="form-group"><label className="form-label">Notas Técnicas</label><textarea className="form-input" value={outcome.technical_notes} onChange={e => setOutcome(p => ({ ...p, technical_notes: e.target.value }))} /></div>
          <div className="form-group"><label className="form-label">Notas da Decisão</label><textarea className="form-input" value={outcome.decision_notes} onChange={e => setOutcome(p => ({ ...p, decision_notes: e.target.value }))} /></div>
          <button className="btn btn-sm btn-purple" disabled={busy} onClick={saveOutcome}>Salvar Desfecho</button>
        </div>

        <div className="form-group">
          <label className="form-label">Adicionar nota interna</label>
          <div style={{ display: 'flex', gap: '8px' }}>
            <input className="form-input" value={note} onChange={e => setNote(e.target.value)} placeholder="Nota interna..." />
            <button className="btn btn-sm btn-outline" disabled={busy} onClick={addNote}>Adicionar</button>
          </div>
        </div>

        <div style={{ marginTop: '16px' }}><span className="form-label">Histórico</span><Timeline items={r.history} /></div>
      </div>
    </div>
  </div>;
}
